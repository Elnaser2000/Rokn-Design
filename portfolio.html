<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض أعمال ركن ديزاين | سرعة ودقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: white; }

        header { background: #111; padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--gold); font-size: 20px; font-weight: bold; text-decoration: none; }

        /* شبكة الصور المحسنة */
        .gallery-container { 
            padding: 20px 5%; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 8px; 
        }
        
        .gallery-item { 
            position: relative; 
            overflow: hidden; 
            border-radius: 6px; 
            height: 220px; 
            cursor: pointer; 
            background: #151515; /* لون خلفية خفيف يظهر قبل الصورة */
        }

        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: 0.3s; 
            opacity: 0; 
        }

        .gallery-item img.loaded { opacity: 1; }

        /* Lightbox (نافذة التكبير) */
        .lightbox { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); display: none; 
            justify-content: center; align-items: center; z-index: 2000; 
        }
        .lightbox img { max-width: 95%; max-height: 85%; border: 1px solid var(--gold); }
        .close-btn { position: absolute; top: 20px; right: 25px; color: white; font-size: 40px; cursor: pointer; }

        @media (max-width: 768px) {
            .gallery-container { grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; }
            .gallery-item { height: 120px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ROKN DESIGN</a>
    <a href="index.html" style="color:#ccc; text-decoration:none; font-size:12px;">إغلاق المعرض ×</a>
</header>

<div class="gallery-container" id="gallery"></div>

<div class="lightbox" id="lightbox">
    <span class="close-btn" id="close">&times;</span>
    <img id="lightbox-img" src="">
    <div id="loading-spinner" style="position:absolute; color:var(--gold); display:none;">جاري تحميل الصورة الأصلية...</div>
</div>

<script>
    const images = [
        "https://i.ibb.co/7d7wj3tr/IMG-20241221-WA0069.jpg", "https://i.ibb.co/d49NPrWL/IMG-20250416-175907.jpg",
        "https://i.ibb.co/Q3Fh8L9x/IMG-20241221-WA0059.jpg", "https://i.ibb.co/FLy9W6fK/IMG-20241221-WA0047.jpg",
        "https://i.ibb.co/5XtbS3ss/FB-IMG-1732788206625.jpg", "https://i.ibb.co/YTZHgXq0/FB-IMG-1732788250701.jpg",
        "https://i.ibb.co/ccZY9vty/IMG-20241026-WA0006.jpg", "https://i.ibb.co/WdB7v4K/IMG-20240801-113048.jpg",

        "https://i.ibb.co/TDBy2Rqr/IMG-20240707-134217.jpg", "https://i.ibb.co/nqvBzFmT/IMG-20240701-195536.jpg",

        "https://i.ibb.co/Y7m9J5Pm/IMG-20240626-121934.jpg", "https://i.ibb.co/nsT594qk/IMG-20240626-121859.jpg",

        "https://i.ibb.co/Xfz8J1m5/IMG-20260218-173638.jpg", "https://i.ibb.co/QvhYMpyL/IMG-20260218-173935.jpg",
        "https://i.ibb.co/Xrr04sjd/IMG.png", "https://i.ibb.co/r9VMWg5/retouch.jpg",
        "https://i.ibb.co/990mD2Dx/Gemini-Generated-Image-9e8gon9e8gon9e8g.png"
    ];

    const container = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const spinner = document.getElementById('loading-spinner');

    images.forEach(url => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        
        const img = document.createElement('img');
        // الحيلة هنا: بنخلي المتصفح يحمل الصورة "تدريجياً" وبنصغر حجم الـ Grid
        img.src = url;
        img.loading = "lazy"; 
        
        img.onload = () => img.classList.add('loaded');
        item.appendChild(img);
        
        item.onclick = () => {
            spinner.style.display = 'block';
            lightboxImg.style.opacity = '0.5';
            lightboxImg.src = url;
            lightbox.style.display = 'flex';
            
            lightboxImg.onload = () => {
                spinner.style.display = 'none';
                lightboxImg.style.opacity = '1';
            };
        };
        container.appendChild(item);
    });

    document.getElementById('close').onclick = () => lightbox.style.display = 'none';
    lightbox.onclick = (e) => { if(e.target !== lightboxImg) lightbox.style.display = 'none'; };
</script>
</body>
</html>
