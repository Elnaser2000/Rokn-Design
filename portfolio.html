<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة أعمال ركن ديزاين | فخر التنفيذ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a0a; color: white; }

        header { background: var(--dark); padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--gold); font-size: 22px; font-weight: bold; text-decoration: none; }
        .back-link { color: #ccc; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-link:hover { color: var(--gold); }

        .portfolio-hero { text-align: center; padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://i.ibb.co/MDvGXF7t/IMG-20240613-WA0007.jpg'); background-size: cover; background-position: center; }
        .portfolio-hero h1 { font-size: 35px; color: var(--gold); margin-bottom: 10px; }
        .portfolio-hero p { font-weight: 300; opacity: 0.8; }

        /* جالينا الصور */
        .gallery-container { padding: 40px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .gallery-item { position: relative; overflow: hidden; border-radius: 12px; height: 350px; cursor: pointer; border: 1px solid #222; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s ease; }
        .gallery-item:hover img { transform: scale(1.1) rotate(2deg); filter: brightness(0.7); }
        
        .gallery-item::after { content: "تكبير الصورة"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 5px; opacity: 0; transition: 0.3s; font-size: 14px; }
        .gallery-item:hover::after { opacity: 1; }

        /* نافذة العرض الكبيرة (Lightbox) */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .lightbox img { max-width: 90%; max-height: 85%; border-radius: 8px; border: 2px solid var(--gold); }
        .close-lightbox { position: absolute; top: 30px; right: 40px; color: white; font-size: 40px; cursor: pointer; }

        footer { text-align: center; padding: 40px; color: #555; font-size: 13px; }
        
        @media (max-width: 768px) {
            .gallery-container { grid-template-columns: repeat(auto-fill, minmax(45%, 1fr)); gap: 10px; }
            .gallery-item { height: 200px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ROKN DESIGN</a>
    <a href="index.html" class="back-link"><i class="fas fa-chevron-right"></i> العودة للرئيسية</a>
</header>

<section class="portfolio-hero">
    <h1>معرض أعمالنا</h1>
    <p>لقطات حقيقية من مواقع التنفيذ تعكس دقة التفاصيل وجودة الخامات</p>
</section>

<div class="gallery-container" id="gallery">
    </div>

<div class="lightbox" id="lightbox">
    <span class="close-lightbox" id="close">&times;</span>
    <img id="lightbox-img" src="">
</div>

<footer>جميع الحقوق محفوظة لشركة ركن ديزاين © 2026</footer>

<script>
    // قائمة الروابط التي أرسلتها
    const images = [
        "https://i.ibb.co/MDvGXF7t/IMG-20240613-WA0007.jpg",
        "https://i.ibb.co/nqtRNFFN/IMG-20240624-120409.jpg",
        "https://i.ibb.co/s9TYbJgZ/IMG-20240624-120610.jpg",
        "https://i.ibb.co/DHr2VNVP/IMG-20240624-120558.jpg",
        "https://i.ibb.co/YFLJMCXL/IMG-20240624-120856.jpg",
        "https://i.ibb.co/MDkNM4MQ/IMG-20240624-120518.jpg",
        "https://i.ibb.co/N2KF2HmH/IMG-20240624-120431.jpg",
        "https://i.ibb.co/LDgn1Nkh/IMG-20240624-120752.jpg",
        "https://i.ibb.co/nsT594qk/IMG-20240626-121859.jpg",

        "https://i.ibb.co/ym66mTjZ/IMG-20240626-235302.jpg",
        "https://i.ibb.co/LzQMjj1b/IMG-20240701-173134.jpg",
        "https://i.ibb.co/tM25GQ1h/IMG-20240701-173121.jpg",

        "https://i.ibb.co/d49NPrWL/IMG-20250416-175907.jpg"
    ];

    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    // إنشاء الصور ديناميكياً
    images.forEach(url => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.innerHTML = `<img src="${url}" loading="lazy" alt="شغل تشطيب ركن ديزاين">`;
        div.onclick = () => {
            lightboxImg.src = url;
            lightbox.style.display = 'flex';
        };
        gallery.appendChild(div);
    });

    // إغلاق النافذة
    document.getElementById('close').onclick = () => lightbox.style.display = 'none';
    lightbox.onclick = (e) => { if(e.target == lightbox) lightbox.style.display = 'none'; };
</script>

</body>
</html>
