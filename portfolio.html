<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فخر تنفيذ ركن ديزاين | معرض الأعمال</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0a0a; color: white; overflow-x: hidden; }

        header { background: var(--dark); padding: 15px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--gold); font-size: 22px; font-weight: bold; text-decoration: none; }
        .back-link { color: #ccc; text-decoration: none; font-size: 13px; transition: 0.3s; }
        .back-link:hover { color: var(--gold); }

        .portfolio-hero { text-align: center; padding: 50px 20px; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102201/1_fqwnax.jpg') center/cover; }
        .portfolio-hero h1 { font-size: 32px; color: var(--gold); margin-bottom: 8px; }
        .portfolio-hero p { font-weight: 300; opacity: 0.8; font-size: 15px; }

        /* جالينا الصور - محسن للأداء */
        .gallery-container { padding: 30px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .gallery-item { position: relative; overflow: hidden; border-radius: 10px; height: 320px; cursor: pointer; border: 1px solid #1a1a1a; background: #111; } /* خلفية داكنة أثناء التحميل */
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s ease; opacity: 0; } /* مخفية حتى يتم تحميلها */
        .gallery-item img.loaded { opacity: 1; } /* تظهر بسلاسة بعد التحميل */
        
        .gallery-item:hover img { transform: scale(1.08); filter: brightness(0.6); }
        
        .gallery-item::after { content: "تكبير الصورة"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); border: 1px solid var(--gold); padding: 6px 12px; border-radius: 4px; opacity: 0; transition: 0.3s; font-size: 13px; font-weight: bold; background: rgba(0,0,0,0.5); }
        .gallery-item:hover::after { opacity: 1; }

        /* نافذة العرض الكبيرة (Lightbox) */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 15px; backdrop-filter: blur(5px); }
        .lightbox img { max-width: 95%; max-height: 90%; border-radius: 6px; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: white; font-size: 35px; cursor: pointer; transition: 0.3s; }
        .close-lightbox:hover { color: var(--gold); transform: rotate(90deg); }

        footer { text-align: center; padding: 30px; color: #444; font-size: 12px; border-top: 1px solid #111; }
        
        @media (max-width: 768px) {
            .gallery-container { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 20px 3%; }
            .gallery-item { height: 180px; }
            .portfolio-hero h1 { font-size: 26px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">ROKN DESIGN</a>
    <a href="index.html" class="back-link"><i class="fas fa-chevron-right"></i> الرئيسية</a>
</header>

<section class="portfolio-hero">
    <h1>معرض أعمالنا</h1>
    <p>لقطات حقيقية من مواقع تنفيذ ركن ديزاين تعكس جودة التشطيب ودقة التفاصيل</p>
</section>

<div class="gallery-container" id="gallery">
    </div>

<div class="lightbox" id="lightbox">
    <span class="close-lightbox" id="close">&times;</span>
    <img id="lightbox-img" src="">
</div>

<footer>جميع الحقوق محفوظة لشركة ركن ديزاين الهندسي © 2026</footer>

<script>
    // قائمة الروابط الجديدة والمحسنة السرعة (مرفوعة على Cloudinary)
    const optimizedImages = [
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102201/1_fqwnax.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102202/2_zqubcy.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102202/3_qoplmf.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102202/4_s9076h.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102201/5_vdyuax.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773104913/6_ckpa5t.png", // الصورة الرئيسية
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102202/7_aed0y9.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102203/8_s6fay0.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102203/9_xtm201.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102203/10_iv78t8.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102203/11_ubep3m.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102203/12_x3yv9n.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102204/13_g999p6.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102204/14_shh2on.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102204/15_m64m67.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102204/16_oapwiv.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102204/17_mbyidk.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102204/18_scu4w4.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102204/19_yqaxu2.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102205/20_lix4by.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102205/21_skn0p4.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102205/22_c9d9d5.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102205/23_v78qyy.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102205/24_i5z5v5.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102205/25_e5uux3.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102206/26_r9g9v5.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102206/27_d5d5x5.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102206/28_u5u8u8.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102206/29_x9x9a5.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102206/30_a1a1a1.jpg",
        "https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102206/31_b2b2b2.jpg"
    ];

    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    // إنشاء الصور ديناميكياً مع تقنيات تسريع التحميل
    optimizedImages.forEach(url => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        
        // استخدام loading="lazy" و فكرة الـ Fade-in الشيك
        const img = document.createElement('img');
        img.src = url;
        img.alt = "شغل تشطيب ركن ديزاين الفاخر";
        img.loading = "lazy"; // لا تحمل الصورة إلا عندما يقترب العميل منها
        
        // عند اكتمال تحميل الصورة، أضف كلاس الكلاس لإظهارها بسلاسة
        img.onload = () => img.classList.add('loaded');
        
        div.appendChild(img);
        
        // وظيفة التكبير
        div.onclick = () => {
            lightboxImg.src = url; // تحميل النسخة المضغوطة أيضاً في التكبير لضمان السرعة
            lightbox.style.display = 'flex';
        };
        gallery.appendChild(div);
    });

    // إغلاق النافذة
    document.getElementById('close').onclick = () => lightbox.style.display = 'none';
    lightbox.onclick = (e) => { if(e.target == lightbox) lightbox.style.display = 'none'; };
    
    // إغلاق بزر الـ Escape في الكيبورد
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape" && lightbox.style.display === 'flex') {
            lightbox.style.display = 'none';
        }
    });
</script>

</body>
</html>
