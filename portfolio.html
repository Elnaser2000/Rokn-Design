<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>معرض أعمال ركن ديزاين | استعرض الصور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        * { 
            margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none; /* منع ظهور قائمة الحفظ في آيفون */
            -webkit-user-select: none;   /* منع تحديد النصوص أو الصور */
            user-select: none;
        }
        body { background: var(--dark); color: white; overflow-x: hidden; }

        header { background: #111; padding: 10px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--gold); font-size: 18px; font-weight: bold; text-decoration: none; }
        .back-link { color: #ccc; text-decoration: none; font-size: 12px; }

        .gallery-container { padding: 15px 4%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .gallery-item { position: relative; overflow: hidden; border-radius: 4px; height: 120px; cursor: pointer; background: #151515; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; opacity: 0; pointer-events: none; }
        .gallery-item img.loaded { opacity: 1; }

        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; justify-content: center; align-items: center; z-index: 2000; touch-action: none; }
        .lightbox img { max-width: 95%; max-height: 85%; border: 1px solid var(--gold); pointer-events: none; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 35px; cursor: pointer; z-index: 2001; }

        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 30px; cursor: pointer; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; z-index: 2002; }
        .prev-btn { right: 10px; }
        .next-btn { left: 10px; }

        @media (min-width: 768px) {
            .gallery-container { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; padding: 20px 5%; }
            .gallery-item { height: 280px; }
        }
    </style>
</head>
<body oncontextmenu="return false;"> <header>
    <a href="index.html" class="logo">ROKN DESIGN</a>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> الرئيسية</a>
</header>

<div class="gallery-container" id="gallery"></div>

<div class="lightbox" id="lightbox">
    <span class="close-btn" id="close" onclick="closeLightbox()">&times;</span>
    <i class="fas fa-chevron-right nav-btn prev-btn" onclick="prevImage()"></i>
    <img id="lightbox-img" src="" oncontextmenu="return false;">
    <i class="fas fa-chevron-left nav-btn next-btn" onclick="nextImage()"></i>
    <div id="loading-spinner" style="position:absolute; color:var(--gold); display:none; font-size: 14px;">جاري التحميل...</div>
</div>

<script>
    const images = [
        "https://i.ibb.co/7d7wj3tr/IMG-20241221-WA0069.jpg", "https://i.ibb.co/d49NPrWL/IMG-20250416-175907.jpg",
        "https://i.ibb.co/Q3Fh8L9x/IMG-20241221-WA0059.jpg", "https://i.ibb.co/FLy9W6fK/IMG-20241221-WA0047.jpg",
        "https://i.ibb.co/5XtbS3ss/FB-IMG-1732788206625.jpg", "https://i.ibb.co/YTZHgXq0/FB-IMG-1732788250701.jpg",
        "https://i.ibb.co/ccZY9vty/IMG-20241026-WA0006.jpg", "https://i.ibb.co/WdB7v4K/IMG-20240801-113048.jpg",
        "https://i.ibb.co/fYGf7Zj9/IMG-20240708-182753.jpg", "https://i.ibb.co/pv6Xn0Zm/IMG-20240707-134439.jpg",
        "https://i.ibb.co/TDBy2Rqr/IMG-20240707-134217.jpg", "https://i.ibb.co/nqvBzFmT/IMG-20240701-195536.jpg",
        "https://i.ibb.co/tM25GQ1h/IMG-20240701-173121.jpg", "https://i.ibb.co/LzQMjj1b/IMG-20240701-173134.jpg",
        "https://i.ibb.co/ym66mTjZ/IMG-20240626-235302.jpg", "https://i.ibb.co/svF7S0td/IMG-20240626-235234.jpg",
        "https://i.ibb.co/Q3QyPWnJ/IMG-20240626-235157.jpg", "https://i.ibb.co/7JDQMW1F/IMG-20240626-122240.jpg",
        "https://i.ibb.co/xWZtvrS/IMG-20240626-122229.jpg", "https://i.ibb.co/bjd2XqQz/IMG-20240626-122309.jpg",
        "https://i.ibb.co/Y7m9J5Pm/IMG-20240626-121934.jpg", "https://i.ibb.co/nsT594qk/IMG-20240626-121859.jpg",
        "https://i.ibb.co/LDgn1Nkh/IMG-20240624-120752.jpg", "https://i.ibb.co/N2KF2HmH/IMG-20240624-120431.jpg",
        "https://i.ibb.co/MDkNM4MQ/IMG-20240624-120518.jpg", "https://i.ibb.co/YFLJMCXL/IMG-20240624-120856.jpg",
        "https://i.ibb.co/DHr2VNVP/IMG-20240624-120558.jpg", "https://i.ibb.co/s9TYbJgZ/IMG-20240624-120610.jpg",
        "https://i.ibb.co/nqtRNFFN/IMG-20240624-120409.jpg", "https://i.ibb.co/MDvGXF7t/IMG-20240613-WA0007.jpg",
        "https://i.ibb.co/21QCcpJs/IMG-20260207-164712-946.jpg", "https://i.ibb.co/V0FW6kRc/IMG-20260207-164816-481.jpg",
        "https://i.ibb.co/0RBC44wk/IMG-20260207-164739-135.jpg", "https://i.ibb.co/6RSRcpGc/IMG-20260207-164816-085.jpg",
        "https://i.ibb.co/0y6ZbL06/IMG-20260217-180609.jpg", "https://i.ibb.co/kstHSxmX/IMG-20260217-180549.jpg",
        "https://i.ibb.co/5gzkhH3z/IMG-20260217-181347.jpg", "https://i.ibb.co/XZ1bDWg0/IMG-20260218-172256.jpg",
        "https://i.ibb.co/1YqFQPG2/IMG-20260218-173028.jpg", "https://i.ibb.co/zHx3bdx1/IMG-20260218-173502.jpg",
        "https://i.ibb.co/Xfz8J1m5/IMG-20260218-173638.jpg", "https://i.ibb.co/QvhYMpyL/IMG-20260218-173935.jpg",
        "https://i.ibb.co/Xrr04sjd/IMG.png", "https://i.ibb.co/r9VMWg5/retouch.jpg",
        "https://i.ibb.co/990mD2Dx/Gemini-Generated-Image-9e8gon9e8gon9e8g.png"
    ];

    let currentImageIndex = 0;
    const container = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const spinner = document.getElementById('loading-spinner');

    images.forEach((url, index) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        const img = document.createElement('img');
        img.src = url;
        img.loading = "lazy";
        img.onload = () => img.classList.add('loaded');
        item.appendChild(img);
        item.onclick = () => openLightbox(index);
        container.appendChild(item);
    });

    function openLightbox(index) {
        currentImageIndex = index;
        updateLightboxImage();
        lightbox.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        lightbox.style.display = 'none';
        document.body.style.overflow = '';
    }

    function updateLightboxImage() {
        spinner.style.display = 'block';
        lightboxImg.style.opacity = '0';
        const tempImg = new Image();
        tempImg.src = images[currentImageIndex];
        tempImg.onload = () => {
            lightboxImg.src = images[currentImageIndex];
            spinner.style.display = 'none';
            lightboxImg.style.opacity = '1';
        };
    }

    function nextImage() { currentImageIndex = (currentImageIndex + 1) % images.length; updateLightboxImage(); }
    function prevImage() { currentImageIndex = (currentImageIndex - 1 + images.length) % images.length; updateLightboxImage(); }

    let touchStartX = 0, touchEndX = 0;
    lightbox.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    lightbox.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, { passive: true });
    function handleSwipe() {
        if (touchStartX - touchEndX > 50) nextImage();
        else if (touchEndX - touchStartX > 50) prevImage();
    }

    lightbox.onclick = (e) => { if(e.target === lightbox) closeLightbox(); };

    // حماية إضافية: منع سحب الصورة (Drag)
    document.addEventListener('dragstart', (e) => { if (e.target.tagName === 'IMG') e.preventDefault(); });
</script>
</body>
</html>
