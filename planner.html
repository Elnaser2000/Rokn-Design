<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROKN DESIGN 2D | المخطط الهندسي المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <style>
        :root { --gold:#d4af37; --dark:#111; --bg:#f0f2f5; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{background:var(--bg);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
        
        header { background: var(--dark); color: var(--gold); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        
        .toolbar { background: #222; padding: 8px; display: flex; gap: 8px; overflow-x: auto; justify-content: center; border-bottom: 1px solid #444; }
        .tool-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .tool-btn.active { background: var(--gold); color: var(--dark); font-weight: bold; }

        #container { flex: 1; background: #fff; position: relative; }
        /* خلفية مربعات هندسية دقيقة */
        #container canvas { background-image: 
            linear-gradient(45deg, #f5f5f5 25%, transparent 25%), 
            linear-gradient(-45deg, #f5f5f5 25%, transparent 25%), 
            linear-gradient(45deg, transparent 75%, #f5f5f5 75%), 
            linear-gradient(-45deg, transparent 75%, #f5f5f5 75%);
            background-size: 40px 40px; background-position: 0 0, 0 20px, 20px -20px, -20px 0px; }

        .library { height: 180px; background: var(--dark); border-top: 3px solid var(--gold); display: flex; flex-direction: column; }
        .tabs { display: flex; background: #1a1a1a; }
        .tab { padding: 10px 20px; color: #888; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); font-weight: bold; }
        
        .items-grid { flex: 1; display: flex; gap: 15px; padding: 15px; overflow-x: auto; align-items: center; }
        .item-box { min-width: 80px; text-align: center; color: #eee; cursor: pointer; }
        .item-box img { width: 50px; height: 50px; object-fit: contain; background: #2a2a2a; padding: 5px; border-radius: 8px; border: 1px solid #444; }
        
        .floating-info { position: absolute; top: 75px; left: 15px; background: rgba(0,0,0,0.7); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 12px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <span>ROKN DESIGN | 2D Pro</span>
    <button class="tool-btn" style="background:var(--gold); color:#000;" onclick="saveImage()">تصدير المخطط</button>
</header>

<div class="toolbar">
    <button class="tool-btn active" id="wallBtn" onclick="setMode('wall')"><i class="fas fa-border-all"></i> بناء حوائط</button>
    <button class="tool-btn" id="furnBtn" onclick="setMode('furniture')"><i class="fas fa-couch"></i> إضافة أثاث</button>
    <button class="tool-btn" onclick="deleteObj()" style="color:#ff6b6b;"><i class="fas fa-trash-alt"></i> حذف</button>
    <button class="tool-btn" onclick="clearAll()"><i class="fas fa-redo"></i> جديد</button>
</div>

<div id="container">
    <div class="floating-info" id="hint">الوضع الحالي: رسم الحوائط الذكية</div>
</div>

<div class="library">
    <div class="tabs" id="tabsMenu"></div>
    <div class="items-grid" id="itemsGrid"></div>
</div>

<script>
    let mode = 'wall';
    const stage = new Konva.Stage({
        container: 'container',
        width: window.innerWidth,
        height: window.innerHeight - 250
    });

    const wallLayer = new Konva.Layer();
    const furnLayer = new Konva.Layer();
    const uiLayer = new Konva.Layer(); // للتحكم والأبعاد
    stage.add(wallLayer, furnLayer, uiLayer);

    const tr = new Konva.Transformer({ 
        rotateEnabled: true, 
        enabledAnchors: ['top-left', 'top-right', 'bottom-left', 'bottom-right'],
        borderStroke: '#d4af37'
    });
    uiLayer.add(tr);

    const db = {
        'حوائط': [
            { name: "غرفة كاملة", type: 'room', img: "https://cdn-icons-png.flaticon.com/512/2544/2544087.png" },
            { name: "باب", type: 'item', img: "https://i.ibb.co/yNf9M4X/door-top.png" },
            { name: "شباك", type: 'item', img: "https://i.ibb.co/fDb7mR9/window-top.png" }
        ],
        'أثاث': [
            { name: "كنبة ركنة", type: 'item', img: "https://i.ibb.co/vYfzqfM/sofa-top.png" },
            { name: "سرير ماستر", type: 'item', img: "https://i.ibb.co/6yXW0Yp/bed-top.png" },
            { name: "طاولة طعام", type: 'item', img: "https://i.ibb.co/m0f8v5f/table-top.png" }
        ],
        'أرضيات': [
            { name: "باركية أرو", type: 'floor', img: "https://i.ibb.co/YyYf4p9/parquet.jpg" },
            { name: "رخام كليوباترا", type: 'floor', img: "https://i.ibb.co/LnbmDq1/tile1.jpg" }
        ]
    };

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(m === 'wall' ? 'wallBtn' : 'furnBtn').classList.add('active');
        document.getElementById('hint').innerText = m === 'wall' ? "اضغط لسحب الغرفة وتغيير مقاسها" : "تحريك وتدوير العناصر";
        tr.nodes([]); uiLayer.draw();
    }

    // وظيفة إضافة الغرفة كـ Block واحد (زي Planner 5D)
    function addRoom() {
        const group = new Konva.Group({ x: 100, y: 100, draggable: true, name: 'obj' });
        
        // الحوائط (مستطيل مفرغ بسمك)
        const rect = new Konva.Rect({
            width: 200, height: 150,
            stroke: '#111', strokeWidth: 15, // سمك الحيطة
            fill: '#fff',
            name: 'wall-rect'
        });

        // نص المقاسات
        const dimText = new Konva.Text({
            text: "4.00 x 3.00 م",
            fontSize: 14, fontStyle: 'bold', fill: '#d4af37',
            width: 200, align: 'center', y: 70
        });

        group.add(rect, dimText);
        wallLayer.add(group);
        
        // تحديث المقاسات عند التغيير
        group.on('transform', () => {
            const w = (rect.width() * group.scaleX() / 50).toFixed(2);
            const h = (rect.height() * group.scaleY() / 50).toFixed(2);
            dimText.text(`${w} x ${h} م`);
            dimText.width(rect.width() * group.scaleX());
        });

        wallLayer.draw();
    }

    function addItem(item) {
        if (item.type === 'room') { addRoom(); return; }

        Konva.Image.fromURL(item.img, (img) => {
            img.setAttrs({
                x: 150, y: 150,
                width: 100, height: 100,
                draggable: true, name: 'obj'
            });
            furnLayer.add(img);
            furnLayer.draw();
        });
    }

    // التحكم بالاختيار
    stage.on('click tap', (e) => {
        if (e.target === stage) { tr.nodes([]); uiLayer.draw(); return; }
        const target = e.target.findAncestor('.obj') || e.target;
        if (target.hasName('obj') || target.hasName('item')) {
            tr.nodes([target]);
            uiLayer.draw();
        }
    });

    function deleteObj() {
        const selected = tr.nodes();
        if (selected.length > 0) {
            selected[0].destroy();
            tr.nodes([]);
            stage.draw();
        }
    }

    function clearAll() { wallLayer.destroyChildren(); furnLayer.destroyChildren(); tr.nodes([]); stage.draw(); }

    function showCat(cat) {
        const grid = document.getElementById('itemsGrid'); grid.innerHTML = '';
        db[cat].forEach(item => {
            const box = document.createElement('div');
            box.className = 'item-box';
            box.innerHTML = `<img src="${item.img}"><p style="font-size:9px">${item.name}</p>`;
            box.onclick = () => addItem(item);
            grid.appendChild(box);
        });
    }

    // بناء القائمة
    Object.keys(db).forEach((cat, i) => {
        const t = document.createElement('div');
        t.className = 'tab' + (i === 0 ? ' active' : '');
        t.innerText = cat;
        t.onclick = (e) => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            e.target.classList.add('active');
            showCat(cat);
        };
        document.getElementById('tabsMenu').appendChild(t);
    });

    function saveImage() {
        tr.nodes([]); uiLayer.draw();
        const dataURL = stage.toDataURL({ pixelRatio: 2 });
        const link = document.createElement('a');
        link.download = 'RoknDesign-Plan.png';
        link.href = dataURL;
        link.click();
    }

    window.onload = () => showCat('حوائط');
</script>

</body>
</html>
