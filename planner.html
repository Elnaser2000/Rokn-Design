<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مخطط ركن ديزاين الشامل | سيراميك وأبواب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <style>
        :root { --gold: #d4af37; --dark: #111; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--dark); padding: 12px; display: flex; justify-content: space-between; align-items: center; color: white; border-bottom: 2px solid var(--gold); }
        
        /* شريط الأدوات العلوي */
        .toolbar { background: #222; padding: 8px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #444; }
        .tool-btn { background: #333; color: white; border: 1px solid #555; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
        .tool-btn.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }

        #container { flex: 1; background: #fff; position: relative; cursor: crosshair; }

        /* المكتبة السفلية المقسمة */
        .library { height: 220px; background: var(--dark); display: flex; flex-direction: column; border-top: 3px solid var(--gold); }
        .tabs { display: flex; background: #1a1a1a; overflow-x: auto; border-bottom: 1px solid #333; }
        .tab { padding: 12px 20px; color: #888; cursor: pointer; font-size: 13px; white-space: nowrap; }
        .tab.active { color: var(--gold); border-bottom: 3px solid var(--gold); background: #222; font-weight: bold; }
        
        .items-scroll { flex: 1; display: flex; gap: 20px; padding: 15px; overflow-x: auto; align-items: flex-start; }
        .item-box { min-width: 90px; text-align: center; cursor: pointer; transition: 0.3s; }
        .item-box:hover { transform: scale(1.1); }
        .item-box img { width: 60px; height: 60px; object-fit: contain; border-radius: 4px; background: #333; padding: 5px; }
        .item-box p { color: #ccc; font-size: 11px; margin-top: 6px; }

        /* تلميح للمستخدم */
        .hint { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 18px; color: var(--gold);">ROKN DESIGN <span style="color:white; font-size:14px;">| المخطط الذكي</span></div>
    <button onclick="exportDesign()" class="tool-btn" style="background:var(--gold); color:var(--dark); font-weight:bold;">حفظ وإرسال</button>
</header>

<div class="toolbar">
    <button class="tool-btn active" id="wallBtn" onclick="setMode('wall')"><i class="fas fa-pen-nib"></i> رسم الحوائط</button>
    <button class="tool-btn" id="furnitureBtn" onclick="setMode('furniture')"><i class="fas fa-mouse-pointer"></i> تحريك وفرش</button>
    <button class="tool-btn" onclick="clearCanvas()"><i class="fas fa-undo"></i> مسح اللوحة</button>
</div>

<div id="container">
    <div class="hint" id="statusHint">الآن: ارسم حدود الشقة بصباعك</div>
</div>

<div class="library">
    <div class="tabs" id="tabsList">
        <div class="tab active" onclick="showCat('floors', this)">سيراميك وأرضيات</div>
        <div class="tab" onclick="showCat('openings', this)">أبواب وشبابيك</div>
        <div class="tab" onclick="showCat('living', this)">ريسبشن ومعيشة</div>
        <div class="tab" onclick="showCat('kitchen', this)">مطبخ وحمام</div>
    </div>
    <div class="items-scroll" id="itemsList">
        </div>
</div>

<script>
    let mode = 'wall';
    const stage = new Konva.Stage({
        container: 'container',
        width: window.innerWidth,
        height: window.innerHeight - 300,
    });

    const floorLayer = new Konva.Layer(); // طبقة الأرضيات
    const wallLayer = new Konva.Layer();  // طبقة الحوائط
    const furnLayer = new Konva.Layer();  // طبقة العفش والأبواب
    stage.add(floorLayer, wallLayer, furnLayer);

    // قاعدة بيانات العناصر (صور واقعية Top View)
    const db = {
        floors: [
            { name: "بورسلين كليوباترا", img: "https://i.ibb.co/LnbmDq1/tile1.jpg", type: 'floor' },
            { name: "باركية أرو", img: "https://i.ibb.co/YyYf4p9/parquet.jpg", type: 'floor' },
            { name: "رخام مستورد", img: "https://i.ibb.co/vXyX2hM/marble.jpg", type: 'floor' }
        ],
        openings: [
            { name: "باب غرفة خشبي", img: "https://i.ibb.co/yNf9M4X/door-top.png" },
            { name: "شباك ألوميتال", img: "https://i.ibb.co/fDb7mR9/window-top.png" },
            { name: "باب مصفح", img: "https://i.ibb.co/yNf9M4X/door-top.png" }
        ],
        living: [
            { name: "ركنة مودرن", img: "https://i.ibb.co/vYfzqfM/sofa-top.png" },
            { name: "سفرة كاملة", img: "https://i.ibb.co/m0f8v5f/table-top.png" },
            { name: "شاشة 65 بوصة", img: "https://cdn-icons-png.flaticon.com/512/3159/3159461.png" }
        ],
        kitchen: [
            { name: "حوض مطبخ", img: "https://i.ibb.co/vBfLhXn/sink.png" },
            { name: "قاعدة تواليت", img: "https://i.ibb.co/yXN85p2/toilet.png" }
        ]
    };

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(m + 'Btn').classList.add('active');
        document.getElementById('statusHint').innerText = m === 'wall' ? "ارسم حدود الشقة" : "اسحب القطع لترتيبها";
        stage.draggable(m === 'furniture');
    }

    // منطق رسم الحوائط
    let isDrawing = false;
    let line;
    stage.on('mousedown touchstart', (e) => {
        if (mode !== 'wall') return;
        isDrawing = true;
        const pos = stage.getPointerPosition();
        line = new Konva.Line({
            stroke: '#000',
            strokeWidth: 8,
            points: [pos.x, pos.y, pos.x, pos.y],
            lineCap: 'round', lineJoin: 'round'
        });
        wallLayer.add(line);
    });

    stage.on('mousemove touchmove', () => {
        if (!isDrawing || mode !== 'wall') return;
        const pos = stage.getPointerPosition();
        const points = line.points();
        points[2] = pos.x; points[3] = pos.y;
        line.points(points);
        wallLayer.batchDraw();
    });

    stage.on('mouseup touchend', () => isDrawing = false);

    // إضافة العناصر للوحة
    function addToCanvas(item) {
        Konva.Image.fromURL(item.img, (img) => {
            img.setAttrs({
                x: 150, y: 150,
                width: item.type === 'floor' ? 400 : 100,
                height: item.type === 'floor' ? 400 : 100,
                draggable: true,
                name: 'object'
            });

            // تدوير العنصر باللمس المزدوج
            img.on('dblclick dbltap', () => { img.rotation(img.rotation() + 45); furnLayer.draw(); });

            if(item.type === 'floor') {
                floorLayer.add(img); floorLayer.draw();
            } else {
                furnLayer.add(img); furnLayer.draw();
            }
            setMode('furniture');
        });
    }

    function showCat(cat, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        const list = document.getElementById('itemsList');
        list.innerHTML = '';
        db[cat].forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-box';
            div.innerHTML = `<img src="${item.img}"><p>${item.name}</p>`;
            div.onclick = () => addToCanvas(item);
            list.appendChild(div);
        });
    }

    function clearCanvas() { 
        wallLayer.destroyChildren(); 
        furnLayer.destroyChildren(); 
        floorLayer.destroyChildren(); 
        stage.draw(); 
    }

    function exportDesign() {
        alert("يا هندسة، تم حفظ كروكي الشقة بنجاح! جاري إرسال البيانات لفريق ركن ديزاين.");
    }

    // تشغيل أول فئة
    window.onload = () => showCat('floors', document.querySelector('.tab'));
</script>

</body>
</html>
