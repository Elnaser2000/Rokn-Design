<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROKN DESIGN 2D Pro | Sweet Home Style</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/konva@9/konva.min.js"></script>
<style>
:root { --gold:#d4af37; --dark:#111; --bg:#f0f2f5; }
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:var(--bg);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{background:var(--dark);color:var(--gold);padding:10px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--gold);}
.toolbar{background:#222;padding:8px;display:flex;gap:8px;overflow-x:auto;justify-content:center;border-bottom:1px solid #444;}
.tool-btn{background:#333;color:white;border:1px solid #555;padding:8px 15px;border-radius:6px;cursor:pointer;font-size:13px;transition:0.2s;}
.tool-btn.active{background:var(--gold);color:var(--dark);font-weight:bold;}
#container{flex:1;position:relative;background:#fff;}
#container canvas{background-image:linear-gradient(#eee 1px,transparent 1px),linear-gradient(90deg,#eee 1px,transparent 1px);background-size:25px 25px;}
.library{height:200px;background:var(--dark);border-top:3px solid var(--gold);display:flex;flex-direction:column;}
.tabs{display:flex;background:#1a1a1a;}
.tab{padding:10px 20px;color:#888;cursor:pointer;font-size:12px;white-space:nowrap;}
.tab.active{color:var(--gold);border-bottom:3px solid var(--gold);font-weight:bold;}
.items-grid{flex:1;display:flex;gap:15px;padding:15px;overflow-x:auto;align-items:center;}
.item-box{min-width:70px;text-align:center;cursor:pointer;}
.item-box img{width:50px;height:50px;object-fit:contain;background:#2a2a2a;padding:5px;border-radius:8px;border:1px solid #444;}
.floating-info{position:absolute;top:75px;left:15px;background:rgba(0,0,0,0.7);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;z-index:10;pointer-events:none;}
</style>
</head>
<body>
<header>
<span>ROKN DESIGN 2D Pro</span>
<button class="tool-btn" style="background:var(--gold); color:#000;" onclick="exportPlan()">تصدير المخطط</button>
</header>

<div class="toolbar">
<button class="tool-btn active" id="wallBtn" onclick="setMode('wall')"><i class="fas fa-border-all"></i> بناء الحوائط</button>
<button class="tool-btn" id="furnBtn" onclick="setMode('furniture')"><i class="fas fa-couch"></i> إضافة أثاث</button>
<button class="tool-btn" onclick="deleteSelected()" style="color:#ff6b6b;"><i class="fas fa-trash-alt"></i> حذف</button>
<button class="tool-btn" onclick="clearAll()"><i class="fas fa-redo"></i> جديد</button>
</div>

<div id="container">
<div class="floating-info" id="hint">الوضع الحالي: رسم الحوائط</div>
</div>

<div class="library">
<div class="tabs" id="tabsMenu"></div>
<div class="items-grid" id="itemsGrid"></div>
</div>

<script>
let mode='wall';
const stage=new Konva.Stage({container:'container',width:window.innerWidth,height:window.innerHeight-250});
const wallLayer=new Konva.Layer(), furnLayer=new Konva.Layer(), uiLayer=new Konva.Layer();
stage.add(wallLayer,furnLayer,uiLayer);

const tr=new Konva.Transformer({rotateEnabled:true,enabledAnchors:['top-left','top-right','bottom-left','bottom-right'],borderStroke:'#d4af37'});
uiLayer.add(tr);

// قاعدة بيانات 100 عنصر تقريباً
const db={'حوائط':[], 'أثاث':[], 'أرضيات':[]};
for(let i=1;i<=100;i++){
 db['أثاث'].push({name:'عنصر '+i,type:'item',img:'https://via.placeholder.com/50?text='+i});
}
// مثال حوائط وأرضيات
db['حوائط'].push({name:'غرفة كاملة',type:'room',img:''});
db['أرضيات'].push({name:'باركية',type:'floor',img:'https://i.ibb.co/YyYf4p9/parquet.jpg'});

function setMode(m){mode=m;document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));document.getElementById(m==='wall'?'wallBtn':'furnBtn').classList.add('active');document.getElementById('hint').innerText=m==='wall'?'رسم الحوائط':'تحريك وتدوير العناصر';tr.nodes([]);uiLayer.draw();}

function addRoom(){
 const group=new Konva.Group({x:100,y:100,draggable:true,name:'obj'});
 const rect=new Konva.Rect({width:200,height:150,stroke:'#111',strokeWidth:15,fill:'#fff',name:'wall-rect'});
 const dimText=new Konva.Text({text:'4.00 x 3.00 م',fontSize:14,fontStyle:'bold',fill:'#d4af37',width:200,align:'center',y:70});
 group.add(rect,dimText);wallLayer.add(group);
 group.on('transform',()=>{const w=(rect.width()*group.scaleX()/50).toFixed(2);const h=(rect.height()*group.scaleY()/50).toFixed(2);dimText.text(`${w} x ${h} م`);dimText.width(rect.width()*group.scaleX());});
 wallLayer.draw();
}

function addItem(item){if(item.type==='room'){addRoom();return;}Konva.Image.fromURL(item.img,img=>{img.setAttrs({x:150,y:150,width:100,height:100,draggable:true,name:'obj'});furnLayer.add(img);furnLayer.draw();});}

stage.on('click tap',e=>{if(e.target===stage){tr.nodes([]);uiLayer.draw();return;}const target=e.target.findAncestor('.obj')||e.target;if(target.hasName('obj')||target.hasName('item')){tr.nodes([target]);uiLayer.draw();}});

function deleteSelected(){const selected=tr.nodes();if(selected.length>0){selected[0].destroy();tr.nodes([]);stage.draw();}}
function clearAll(){wallLayer.destroyChildren();furnLayer.destroyChildren();tr.nodes([]);stage.draw();}

function showCat(cat){const grid=document.getElementById('itemsGrid');grid.innerHTML='';db[cat].forEach(item=>{const box=document.createElement('div');box.className='item-box';box.innerHTML=`<img src="${item.img}"><p>${item.name}</p>`;box.onclick=()=>addItem(item);grid.appendChild(box);});}

Object.keys(db).forEach((cat,i)=>{const t=document.createElement('div');t.className='tab'+(i===0?' active':'');t.innerText=cat;t.onclick=e=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');showCat(cat);};document.getElementById('tabsMenu').appendChild(t);});

function exportPlan(){tr.nodes([]);uiLayer.draw();const dataURL=stage.toDataURL({pixelRatio:2});const link=document.createElement('a');link.download='RoknDesign-Plan.png';link.href=dataURL;link.click();}

window.onload=()=>showCat('حوائط');
</script>
</body>
</html>
