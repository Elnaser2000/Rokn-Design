<script>
// روابط المقايسات الفنية من ملفات الـ PDF الخاصة بك
const driveLinks = {
    "اقتصادية": "https://drive.google.com/file/d/1q6Qjus9R1n77HEeYJt9jZOBQLiCxEJCb/view",
    "فضية": "https://drive.google.com/file/d/13oWM07jZrzjzwUWoB0QlIdJZ_kbZ4PSI/view",
    "ذهبية": "https://drive.google.com/file/d/1jwfreY749gKB8MtTjdkECBcHW7NbuP8A/view",
    "VIP": "https://drive.google.com/file/d/1m6Q_example_vip_link/view" // يرجى وضع رابط ملف الـ VIP هنا
};

const scriptURL = "https://script.google.com/macros/s/AKfycbzhrH0VWebHuKu9rK4YxWBO0ZnW5iLmbVmGrqX-YTlEwNO8d31in-q_e3Pnppqnw4Gs/exec";

const prices = {
    "الهرم - فيصل": {اقتصادية:2800, فضية:3500, ذهبية:3800, VIP:4800},
    "أكتوبر": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "حدائق اكتوبر": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "حدائق الأهرام": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "الشيخ زايد": {اقتصادية:3500, فضية:3900, ذهبية:4200, VIP:4800},
    "دريم لاند": {اقتصادية:3500, فضية:3900, ذهبية:4200, VIP:4800},
    "الفردوس": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "الخمائل": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "العاصمة الإدارية": {اقتصادية:4200, فضية:4900, ذهبية:5200, VIP:6800}
};

let lastCalculatedTotal = 0;

document.getElementById("costForm").addEventListener("submit", function(e) {
    e.preventDefault();
    
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let area = Number(document.getElementById("area").value);
    let unit = document.getElementById("unit").value;
    let finish = document.getElementById("finish").value;
    let region = document.getElementById("region").value;
    let pack = document.getElementById("package").value;
    let metal = document.getElementById("metal").value;

    // المعادلات الأصلية (لم يتم تغييرها)
    let pricePerMeter = prices[region][pack];
    if(finish == "طوب احمر") pricePerMeter += 500;
    
    let total = pricePerMeter * area;
    
    if(unit == "دوبلكس") total += 70000;
    if(unit == "فيلا") total += 100000;
    if(unit == "أرضي بجنينة") total += 25000;
    if(finish == "تجديد") total += 30000;
    if(metal == "تركيب الموتال") total += 35000;

    lastCalculatedTotal = total;

    // إظهار النتيجة في الصفحة
    document.getElementById("resultArea").style.display = "block";
    document.getElementById("resDetails").innerHTML = `
        <div class="res-item"><span>الاسم:</span> <span>${name}</span></div>
        <div class="res-item"><span>المنطقة:</span> <span>${region}</span></div>
        <div class="res-item"><span>الباقة:</span> <span>${pack}</span></div>
        <div class="res-item"><span>المساحة:</span> <span>${area} م2</span></div>
    `;
    document.getElementById("resTotal").innerText = `الإجمالي: ${total.toLocaleString()} جنيه`;

    // إرسال البيانات لجوجل شيت (صيد الداتا)
    fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({name, phone, area, unit, finish, region, package:pack, metal, total})
    }).then(() => console.log("Data synced to Sheets"));

    document.getElementById("resultArea").scrollIntoView({behavior:'smooth'});
});

function sendWhatsApp() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let region = document.getElementById("region").value;
    let pack = document.getElementById("package").value;
    let unit = document.getElementById("unit").value;
    let finish = document.getElementById("finish").value;
    let metal = document.getElementById("metal").value;
    let area = document.getElementById("area").value;
    
    // جلب لينك المقايسة بناءً على الباقة المختارة
    const pdfLink = driveLinks[pack];

    let message = `طلب معاينة جديد من موقع ركن ديزاين\n` +
                  `أهلاً بك يا ${name}\n` +
                  `رقم الموبايل: ${phone}\n` +
                  `المنطقة: ${region}\n` +
                  `نوع الوحدة: ${unit}\n` +
                  `المساحة: ${area} متر\n` +
                  `حالة الاستلام: ${finish}\n` +
                  `الألوميتال: ${metal}\n` +
                  `الباقة المختارة: ${pack}\n` +
                  `التكلفة التقديرية: ${lastCalculatedTotal.toLocaleString()} جنيه\n\n` +
                  `يمكنك مراجعة المواصفات الفنية لباقة (${pack}) من خلال هذا الرابط:\n` +
                  `${pdfLink}\n\n` +
                  `يرجى التواصل لتحديد موعد المعاينة.`;
    
    window.open("https://wa.me/201151983638?text=" + encodeURIComponent(message));
}
</script>
