<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة تكاليف ركن ديزاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{background:#f5f5f5;color:#333;line-height:1.6; padding: 20px;}
        
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); border-top: 5px solid #d4af37; }
        h2 { text-align: center; margin-bottom: 25px; color: #111; font-weight: 700; }
        
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #555; }
        input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: #d4af37; box-shadow: 0 0 8px rgba(212, 175, 55, 0.2); }

        .btn-calc { background: #d4af37; color: white; width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-calc:hover { background: #b8962d; transform: translateY(-2px); }

        #resultArea { display: none; margin-top: 25px; padding: 20px; background: #fff; border: 2px solid #d4af37; border-radius: 12px; animation: slideUp 0.5s ease; }
        .res-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; }
        .total-price { font-size: 22px; font-weight: bold; color: #111; text-align: center; margin-top: 15px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .footer-links { text-align: center; margin-top: 20px; }
        .footer-links a { color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-calculator" style="color: #d4af37;"></i> حاسبة المقايسة التقديرية</h2>
    
    <form id="costForm">
        <input id="name" required placeholder="الاسم بالكامل">
        <input id="phone" required type="tel" placeholder="رقم الموبايل (واتساب)">
        <input id="area" required type="number" placeholder="المساحة بالمتر (م2)">
        
        <label>نوع الوحدة</label>
        <select id="unit" required>
            <option value="">اختار نوع الوحدة</option>
            <option>شقة</option>
            <option>دوبلكس</option>
            <option>فيلا</option>
            <option>أرضي بجنينة</option>
            <option>مكتب إداري</option>
        </select>

        <label>حالة الاستلام</label>
        <select id="finish" required>
            <option value="">اختار حالة التشطيب الحالية</option>
            <option>محارة وحلوق</option>
            <option>طوب احمر</option>
            <option>تجديد</option>
        </select>

        <label>المنطقة</label>
        <select id="region" required>
            <option value="">اختار المنطقة</option>
            <option>الهرم - فيصل</option>
            <option>أكتوبر</option>
            <option>حدائق اكتوبر</option>
            <option>حدائق الأهرام</option>
            <option>الشيخ زايد</option>
            <option>دريم لاند</option>
            <option>الفردوس</option>
            <option>الخمائل</option>
            <option>العاصمة الإدارية</option>
        </select>

        <label>باقة التشطيب</label>
        <select id="package" required>
            <option value="">اختار الباقة المطلوبة</option>
            <option value="اقتصادية">اقتصادية</option>
            <option value="فضية">فضية</option>
            <option value="ذهبية">ذهبية</option>
            <option value="VIP">VIP</option>
        </select>

        <label>الألوميتال</label>
        <select id="metal" required>
            <option value="">هل ترغب في تركيب ألوميتال؟</option>
            <option>تركيب الموتال</option>
            <option>بدون تركيب الموتال</option>
        </select>

        <button type="submit" class="btn-calc">احسب المقايسة الآن</button>
    </form>

    <div id="resultArea">
        <div id="resDetails"></div>
        <div class="total-price" id="resTotal"></div>
        <p style="text-align: center; font-size: 12px; color: #888; margin-top: 10px;">* هذه التكلفة تقديرية بناءً على البيانات المدخلة.</p>
        <button onclick="sendWhatsApp()" class="btn-calc" style="background: #25D366; margin-top: 15px;">
            <i class="fab fa-whatsapp"></i> تفاصيل المقايسة عبر واتساب
        </button>
    </div>

    <div class="footer-links">
        <a href="index.html">← العودة للصفحة الرئيسية</a>
    </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzhrH0VWebHuKu9rK4YxWBO0ZnW5iLmbVmGrqX-YTlEwNO8d31in-q_e3Pnppqnw4Gs/exec";

// روابط المقايسات الفنية
const driveLinks = {
    "اقتصادية": "https://drive.google.com/file/d/1q6Qjus9R1n77HEeYJt9jZOBQLiCxEJCb/view",
    "فضية": "https://drive.google.com/file/d/13oWM07jZrzjzwUWoB0QlIdJZ_kbZ4PSI/view",
    "ذهبية": "https://drive.google.com/file/d/1jwfreY749gKB8MtTjdkECBcHW7NbuP8A/view",
    "VIP": "https://drive.google.com/file/d/1m6Q_example_vip_link/view"
};

const prices = {
    "الهرم - فيصل": {اقتصادية:2800, فضية:3500, ذهبية:3800, VIP:4800},
    "أكتوبر": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "حدائق اكتوبر": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "حدائق الأهرام": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "الشيخ زايد": {اقتصادية:3500, فضية:3900, ذهبية:4200, VIP:4800},
    "دريم لاند": {اقتصادية:3500, فضية:3900, ذهبية:4200, VIP:4800},
    "الفردوس": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "الخمائل": {اقتصادية:3200, فضية:3700, ذهبية:4000, VIP:4800},
    "العاصمة الإدارية": {اقتصادية:4200, فضية:4900, ذهبية:5200, VIP:6800}
};

let lastCalculatedTotal = 0;

document.getElementById("costForm").addEventListener("submit", function(e) {
    e.preventDefault();
    
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let area = Number(document.getElementById("area").value);
    let unit = document.getElementById("unit").value;
    let finish = document.getElementById("finish").value;
    let region = document.getElementById("region").value;
    let pack = document.getElementById("package").value;
    let metal = document.getElementById("metal").value;

    let pricePerMeter = prices[region][pack];
    if(finish == "طوب احمر") pricePerMeter += 500;
    
    let total = pricePerMeter * area;
    
    if(unit == "دوبلكس") total += 70000;
    if(unit == "فيلا") total += 100000;
    if(unit == "أرضي بجنينة") total += 25000;
    if(finish == "تجديد") total += 30000;
    if(metal == "تركيب الموتال") total += 35000;

    lastCalculatedTotal = total;

    document.getElementById("resultArea").style.display = "block";
    document.getElementById("resDetails").innerHTML = `
        <div class="res-item"><span>الاسم:</span> <span>${name}</span></div>
        <div class="res-item"><span>المنطقة:</span> <span>${region}</span></div>
        <div class="res-item"><span>الباقة:</span> <span>${pack}</span></div>
        <div class="res-item"><span>المساحة:</span> <span>${area} م2</span></div>
    `;
    document.getElementById("resTotal").innerText = `الإجمالي: ${total.toLocaleString()} جنيه`;

    fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({name, phone, area, unit, finish, region, package:pack, metal, total})
    });

    document.getElementById("resultArea").scrollIntoView({behavior:'smooth'});
});

function sendWhatsApp() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let region = document.getElementById("region").value;
    let pack = document.getElementById("package").value;
    let unit = document.getElementById("unit").value;
    let finish = document.getElementById("finish").value;
    let metal = document.getElementById("metal").value;
    let area = document.getElementById("area").value;
    
    const pdfLink = driveLinks[pack] || "";

    let message =
                  `أهلاً بك يا ${name}\n` +
                  `الموبايل: ${phone}\n` +
                  `المنطقة: ${region}\n` +
                  `نوع الوحدة: ${unit}\n` +
                  `المساحة: ${area} متر\n` +
                  `حالة التشطيب: ${finish}\n` +
                  `الموتال: ${metal}\n` +
                  `الباقة: ${pack}\n` +
                  `السعر المتوقع: ${lastCalculatedTotal.toLocaleString()} جنيه\n\n` +
                  `رابط مواصفات باقة (${pack}):\n${pdfLink}\n\n` +
                  `برجاء تحديد موعد للمعاينة`;
    
    window.open("https://wa.me/201151983638?text=" + encodeURIComponent(message));
}
</script>

</body>
</html>
