<script>
    // روابط ملفات الـ PDF المرفوعة (المقايسات الفنية لكل باقة)
    const driveLinks = {
        'basic': 'https://drive.google.com/file/d/1q6Qjus9R1n77HEeYJt9jZOBQLiCxEJCb/view', // الباقة الأساسية
        'silver': 'https://drive.google.com/file/d/13oWM07jZrzjzwUWoB0QlIdJZ_kbZ4PSI/view', // الباقة الفضية
        'gold': 'https://drive.google.com/file/d/1jwfreY749gKB8MtTjdkECBcHW7NbuP8A/view',   // الباقة الذهبية
        'vip': 'https://drive.google.com/file/d/1m6Q_example_vip_link/view'               // باقة VIP (ضع الرابط هنا)
    };

    // وظيفة استقبال الباقة من الرابط (URL Params) دون تغيير
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const pkg = urlParams.get('package');
        
        if (pkg) {
            const select = document.getElementById('packageSelect');
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].getAttribute('data-key') === pkg) {
                    select.selectedIndex = i;
                    break;
                }
            }
        }
        calculate(); 
    };

    // المعادلة الحسابية (كما هي بدون تغيير نهائياً)
    function calculate() {
        const area = document.getElementById('area').value || 0;
        const pricePerMeter = document.getElementById('packageSelect').value;
        const total = area * pricePerMeter;
        
        document.getElementById('totalPrice').innerText = total.toLocaleString();
    }

    // إرسال البيانات للواتساب مع "لينك المقايسة المحددة"
    function sendToWhatsapp() {
        const area = document.getElementById('area').value;
        const loc = document.getElementById('location').value;
        const total = document.getElementById('totalPrice').innerText;
        
        // جلب الداتا الخاصة بالباقة المختارة
        const select = document.getElementById('packageSelect');
        const selectedOption = select.options[select.selectedIndex];
        const selectedKey = selectedOption.getAttribute('data-key');
        const packageName = selectedOption.text;
        const pdfLink = driveLinks[selectedKey];

        if(!area || !loc) {
            alert("برجاء إدخال المساحة والموقع أولاً يا هندسة");
            return;
        }

        // صياغة الرسالة الاحترافية
        const message = `السلام عليكم ركن ديزاين،\n` +
                        `أرغب في الحصول على استشارة فنية لتشطيب وحدتي:\n\n` +
                        `📍 الموقع: ${loc}\n` +
                        `📐 المساحة: ${area} متر مربع\n` +
                        `💎 الباقة المختارة: ${packageName}\n` +
                        `💰 التكلفة التقديرية: ${total} جنيه مصري\n\n` +
                        `لقد قمت بمراجعة مواصفات المقايسة الفنية من الرابط التالي:\n` +
                        `${pdfLink}\n\n` +
                        `برجاء التواصل لتحديد موعد المعاينة الفنية.`;

        const encodedMsg = encodeURIComponent(message);
        window.open(`https://wa.me/201151983638?text=${encodedMsg}`, '_blank');
    }
</script>
