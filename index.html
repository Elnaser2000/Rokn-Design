<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن ديزاين للتشطيبات | خلى كل ركن يتكلم عنك</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root { --gold: #d4af37; --dark: #111; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        html { scroll-behavior: smooth; }
        body { background:#f5f5f5; color:#333; line-height:1.6; overflow-x: hidden; }
        
        header { background:var(--dark); color:white; padding:15px 8%; display:flex; justify-content:space-between; align-items:center; position: sticky; top:0; z-index: 1000; border-bottom: 1px solid #333; }
        header h1 { font-size:22px; cursor:pointer; color: var(--gold); }
        nav a { color:white; margin:0 10px; text-decoration:none; font-size:14px; cursor:pointer; transition: 0.3s; }
        nav a:hover { color: var(--gold); }

        /* Hero Section */
        .hero { height:100vh; background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c") center/cover; display:flex; align-items:center; justify-content:center; text-align:center; color:white; }
        .hero-content { max-width:800px; padding: 20px; }
        .hero h2 { font-size:42px; margin-bottom:15px; font-weight: 700; }
        .btn { background:var(--gold); color:white; padding:14px 30px; margin:10px; border:none; text-decoration:none; font-size:16px; border-radius:8px; display:inline-block; cursor:pointer; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: #b8962d; transform: translateY(-3px); }

        /* Slider Section */
        .section-padding { padding: 60px 8%; text-align: center; }
        .section-title { margin-bottom: 40px; font-size: 28px; position: relative; padding-bottom: 10px; }
        .section-title::after { content: ''; width: 50px; height: 3px; background: var(--gold); position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); }

        .slider-container {
            position: relative;
            max-width: 900px;
            margin: auto;
            overflow: hidden;
            border-radius: 15px;
            height: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            /* التعديل هنا: حركة أسرع (0.4 ثانية) لتناسب التبديل كل ثانية */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        .slide { min-width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .slider-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .dot { width: 10px; height: 10px; background: rgba(255,255,255,0.4); border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .dot.active { background: var(--gold); width: 20px; border-radius: 10px; }

        /* Floating Buttons */
        .floating-buttons { position:fixed; bottom:25px; right:25px; display:flex; flex-direction:column; gap:15px; z-index:2000; }
        .floating-buttons a { width:55px; height:55px; display:flex; align-items:center; justify-content:center; border-radius:50%; color:white; font-size:24px; text-decoration:none; box-shadow:0 5px 15px rgba(0,0,0,0.2); }
        .whatsapp-btn { background:#25D366; }
        .call-btn { background:#007BFF; }

        footer { background:#000; color:#666; text-align:center; padding:40px 20px; font-size: 13px; }

        @media (max-width: 768px) {
            .slider-container { height: 280px; }
            .hero h2 { font-size: 30px; }
        }
    </style>
</head>
<body>

<header>
    <h1 onclick="location.reload()">ركن ديزاين</h1>
    <nav>
        <a href="#gallery">أعمالنا</a>
        <a href="packages.html">الباقات</a>
        <a href="portfolio.html">المعرض الكامل</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-content">
        <h2>رؤية هندسية.. بلمسة إبداعية</h2>
        <p>تشطيبات متكاملة بمواصفات "السويدي" و"علاء الدين" لضمان أمان بيتك</p>
        <a href="calculator.html" class="btn">إحسب تكلفة شقتك</a>
    </div>
</section>

<section class="section-padding" id="gallery">
    <h2 class="section-title">إبداعات ركن ديزاين</h2>
    
    <div class="slider-container">
        <div class="slides" id="slides">
            <div class="slide"><img src="https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102201/1_fqwnax.jpg"></div>
            <div class="slide"><img src="https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102202/2_zqubcy.jpg"></div>
            <div class="slide"><img src="https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773102202/3_qoplmf.jpg"></div>
            <div class="slide"><img src="https://res.cloudinary.com/dzp1eqtbi/image/upload/v1773104913/6_ckpa5t.png"></div>
        </div>
        
        <div class="slider-dots" id="slider-dots">
            <span class="dot active" onclick="currentSlide(0)"></span>
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
    </div>
    
    <div style="margin-top: 30px;">
        <a href="portfolio.html" class="btn" style="background:transparent; border: 1px solid var(--gold); color: var(--gold);">
            دخول معرض الصور الكامل <i class="fas fa-images" style="margin-right:8px;"></i>
        </a>
    </div>
</section>

<div class="floating-buttons">
    <a href="https://wa.me/201151983638" class="whatsapp-btn"><i class="fab fa-whatsapp"></i></a>
    <a href="tel:+201151983638" class="call-btn"><i class="fas fa-phone"></i></a>
</div>

<footer>
    <p>جميع الحقوق محفوظة لشركة ركن ديزاين © 2026</p>
</footer>

<script>
    let slideIndex = 0;
    const slidesContainer = document.getElementById('slides');
    const dots = document.querySelectorAll('.dot');
    const totalSlides = 4;

    function startAutoSlide() {
        setInterval(() => {
            slideIndex = (slideIndex + 1) % totalSlides;
            updateSlider();
        }, 1000); // التبديل كل ثانية واحدة
    }

    function currentSlide(n) {
        slideIndex = n;
        updateSlider();
    }

    function updateSlider() {
        const offset = -slideIndex * 100;
        slidesContainer.style.transform = `translateX(${offset}%)`;
        dots.forEach(dot => dot.classList.remove('active'));
        dots[slideIndex].classList.add('active');
    }

    // ابدأ الحركة فور تحميل الصفحة
    window.onload = startAutoSlide;
</script>

</body>
</html>
