<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن ديزاين | Rokan Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #121212; --card: #1e1e1e; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; text-align: center; }
        header { background: #000; padding: 20px; border-bottom: 2px solid var(--gold); }
        .logo-text { color: var(--gold); font-size: 2rem; font-weight: bold; margin: 0; }
        .container { padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 20px; cursor: pointer; color: white; font-weight: bold; }
        .ai-card { background: linear-gradient(135deg, #c5a059 0%, #8e6d2e 100%); color: black; }
        
        /* Modal Style */
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 9999; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .page.active { display: block !important; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; font-family: 'Cairo'; }
        .btn-send { background: var(--gold); color: black; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-close { background: #444; color: white; padding: 10px; border: none; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <p class="logo-text">ROKAN DESIGN</p>
    <div style="color:var(--gold); font-size: 0.8rem;">خلى كل ركن يتكلم عنك</div>
</header>

<div class="container">
    <div class="grid">
        <div class="card" onclick="showPage('calcPage')">📏<br>احسب مقايستك</div>
        <div class="card ai-card" onclick="showPage('aiPage')">🤖<br>صمم بالـ AI</div>
        <div class="card" onclick="window.open('https://wa.me/2010XXXXXXXX')">📞<br>واتساب</div>
        <div class="card" onclick="alert('جاري تجهيز الصور...')">📂<br>أعمالنا</div>
    </div>
</div>

<div id="calcPage" class="page">
    <h2 style="color:var(--gold)">📏 احسب تشطيبك</h2>
    <input type="text" id="custName" placeholder="الاسم">
    <input type="tel" id="custPhone" placeholder="رقم الواتساب">
    <input type="number" id="custArea" placeholder="المساحة بالمتر">
    <select id="custPackage">
        <option value="اقتصادية">الباقة الاقتصادية</option>
        <option value="فضية">الباقة الفضية</option>
        <option value="ذهبية">الباقة الذهبية</option>
        <option value="VIP">باقة VIP</option>
    </select>
    <button class="btn-send" onclick="submitToSheet()">إرسال البيانات</button>
    <button class="btn-close" onclick="hidePage('calcPage')">إغلاق</button>
</div>

<div id="aiPage" class="page">
    <h2 style="color:var(--gold)">🤖 مصمم ركن ديزاين</h2>
    <textarea id="aiDesc" rows="5" placeholder="أوصف ستايل شقتك هنا..."></textarea>
    <button class="btn-send" onclick="goToAI()">توليد الفكرة</button>
    <button class="btn-close" onclick="hidePage('aiPage')">إغلاق</button>
</div>

<script>
    function showPage(id) {
        document.getElementById(id).classList.add('active');
    }
    function hidePage(id) {
        document.getElementById(id).classList.remove('active');
    }

    function goToAI() {
        const text = document.getElementById('aiDesc').value;
        if(!text) { alert("من فضلك اكتب وصفاً أولاً"); return; }
        window.open("https://gemini.google.com/app?prompt=" + encodeURIComponent("صمم لي ديكور " + text), "_blank");
    }

    async function submitToSheet() {
        const url = "https://script.google.com/macros/s/AKfycbyfhWJW3f0PgkXm6sekOdZ1lyO1ohMtv4sID2nuHDMUALPM1nWZgvapupbDR2KuU2BA/exec";
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const area = document.getElementById('custArea').value;
        const pack = document.getElementById('custPackage').value;

        if(!name || !phone || !area) { alert("أكمل البيانات يا هندسة"); return; }

        alert("جاري الإرسال...");

        fetch(url, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                name: name,
                phone: phone,
                area: area,
                package: pack
            })
        }).then(() => {
            alert("تم الإرسال بنجاح! شكراً لثقتك في ركن ديزاين.");
            hidePage('calcPage');
        }).catch(() => {
            alert("حدث خطأ بسيط، جرب تاني.");
        });
    }
</script>

</body>
</html>
