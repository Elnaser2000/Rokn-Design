<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rokn Design | ركن ديزاين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0f0f0f; --card-bg: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; }
        
        /* Header */
        header { background: #000; padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .logo-text { color: var(--gold); font-size: 2.5rem; font-weight: 700; margin: 0; letter-spacing: 1px; text-transform: uppercase; line-height: 1; }
        .slogan { color: #eee; font-size: 1.1rem; margin-top: 15px; font-weight: 400; opacity: 0.9; }

        .container { padding: 20px; max-width: 500px; margin: auto; }
        
        /* Hero Image */
        .hero-img { width: 100%; height: 220px; background: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=1000&auto=format&fit=crop') center/cover; border-radius: 20px; margin-bottom: 25px; border: 1px solid #333; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card-bg); border-radius: 18px; padding: 25px 10px; text-align: center; transition: 0.3s; border: 1px solid #222; cursor: pointer; text-decoration: none; color: white; }
        .card:active { transform: scale(0.96); border-color: var(--gold); }
        .card i { font-size: 2rem; display: block; margin-bottom: 10px; }
        
        .ai-card { background: linear-gradient(145deg, var(--gold), #aa8a2e); color: #000; font-weight: bold; border: none; }

        /* Modals */
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 10000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        h2 { color: var(--gold); text-align: center; margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: white; font-family: 'Cairo'; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .btn-send { background: var(--gold); color: #000; padding: 16px; border: none; border-radius: 10px; width: 100%; font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-top: 10px; }
        .btn-close { background: #222; color: #888; border: none; padding: 10px; border-radius: 10px; width: 100%; margin-top: 15px; cursor: pointer; }

        .price-tag { background: #000; border: 2px dashed var(--gold); padding: 20px; border-radius: 15px; margin-top: 20px; text-align: center; display: none; }
        .price-value { font-size: 1.8rem; color: var(--gold); font-weight: 800; display: block; margin: 5px 0; }
    </style>
</head>
<body>

<header>
    <p class="logo-text">Rokn Design</p>
    <div class="slogan">خلى كل ركن يتكلم عنك</div>
</header>

<div class="container">
    <div class="hero-img"></div>

    <div class="grid">
        <div class="card" onclick="showPage('calcPage')">
            <i style="color:var(--gold)">📏</i>
            <span>مقايسة فورية</span>
        </div>
        <div class="card ai-card" onclick="showPage('aiPage')">
            <i>🤖</i>
            <span>مصمم الـ AI</span>
        </div>
        <div class="card" onclick="window.open('https://wa.me/2010XXXXXXXX')">
            <i style="color:#25d366">💬</i>
            <span>واتساب</span>
        </div>
        <div class="card" onclick="alert('جاري تحديث الأعمال...')">
            <i style="color:#3498db">🖼️</i>
            <span>أعمالنا</span>
        </div>
    </div>
</div>

<div id="calcPage" class="page">
    <h2>📏 طلب مقايسة دقيقة</h2>
    <input type="text" id="custName" placeholder="الاسم الكريم">
    <input type="tel" id="custPhone" placeholder="رقم الواتساب">
    <input type="number" id="custArea" placeholder="المساحة بالمتر (م²)">
    <select id="custPackage">
        <option value="اقتصادية" data-price="3500">الباقة الاقتصادية (3,500 ج/م)</option>
        <option value="فضية" data-price="5000">الباقة الفضية (5,000 ج/م)</option>
        <option value="ذهبية" data-price="7500">الباقة الذهبية (7,500 ج/م)</option>
        <option value="VIP" data-price="11000">باقة VIP (11,000 ج/م)</option>
    </select>
    <button class="btn-send" id="submitBtn" onclick="calculateAndSend()">حساب وإرسال الطلب</button>
    
    <div id="priceResult" class="price-tag">
        <span>التكلفة التقديرية</span>
        <span id="totalPrice" class="price-value">0 ج.م</span>
        <button class="btn-send" style="padding:10px; font-size:0.9rem" onclick="window.open('https://wa.me/2010XXXXXXXX')">تأكيد حجز المعاينة</button>
    </div>
    <button class="btn-close" onclick="hidePage('calcPage')">إغلاق</button>
</div>

<div id="aiPage" class="page">
    <h2>🤖 المصمم الذكي</h2>
    <textarea id="aiDesc" rows="6" placeholder="مثلاً: ريسبشن مودرن، ألوان رمادي وبيج، إضاءة ليد بروفايل..."></textarea>
    <button class="btn-send" onclick="goToAI()">توليد الفكرة</button>
    <button class="btn-close" onclick="hidePage('aiPage')">إغلاق</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqipG71EiR_X7v1L7HgfS2ZVlR_jJC3qqbkqncVsaxfgq1iH8GkSkTqhYBq7iTz79M/exec";

    function showPage(id) { document.getElementById(id).classList.add('active'); }
    function hidePage(id) { document.getElementById(id).classList.remove('active'); }

    function goToAI() {
        const text = document.getElementById('aiDesc').value;
        if(!text) return alert("اكتب وصفاً");
        window.open("https://gemini.google.com/app?prompt=" + encodeURIComponent("اقترح ديكور داخلي لـ " + text), "_blank");
    }

    async function calculateAndSend() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const area = document.getElementById('custArea').value;
        const packSelect = document.getElementById('custPackage');
        const packPrice = packSelect.options[packSelect.selectedIndex].getAttribute('data-price');

        if(!name || !phone || !area) return alert("أكمل البيانات");

        let total = area * packPrice;
        document.getElementById('totalPrice').innerText = total.toLocaleString() + " ج.م";
        document.getElementById('priceResult').style.display = "block";
        document.getElementById('submitBtn').innerText = "تم الإرسال ✓";

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ name, phone, area, package: packSelect.value, total })
            });
        } catch (e) { console.log("Done"); }
    }
</script>

</body>
</html>
