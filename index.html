<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ركن ديزاين | Rokan Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-dark: #aa8a2e; --dark: #0f0f0f; --card-bg: #1a1a1a; }
        body { font-family: 'Cairo', sans-serif; background: var(--dark); color: white; margin: 0; padding: 0; }
        
        /* Header & Brand */
        header { background: linear-gradient(to bottom, #000, var(--dark)); padding: 40px 20px; text-align: center; border-bottom: 1px solid #333; }
        .logo-text { color: var(--gold); font-size: 2.5rem; font-weight: 700; margin: 0; letter-spacing: 3px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .slogan { color: #eee; font-size: 1rem; margin-top: 10px; opacity: 0.8; letter-spacing: 1px; }

        .container { padding: 25px; max-width: 500px; margin: auto; }
        
        /* Hero Section (صورة واجهة) */
        .hero-img { width: 100%; height: 200px; background: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=1000&auto=format&fit=crop') center/cover; border-radius: 20px; margin-bottom: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .hero-overlay { position: absolute; bottom: 15px; right: 15px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 10px; border-right: 3px solid var(--gold); font-size: 0.8rem; }

        /* Modern Grid Cards */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px 15px; text-align: center; transition: all 0.3s ease; border: 1px solid #222; text-decoration: none; color: white; position: relative; overflow: hidden; }
        .card:active { transform: scale(0.95); background: #222; }
        .card i { font-size: 2.2rem; display: block; margin-bottom: 12px; }
        .card span { font-weight: 700; font-size: 0.95rem; display: block; }
        
        .ai-card { background: linear-gradient(145deg, var(--gold), var(--gold-dark)); color: #000; border: none; }
        .ai-card span { font-weight: 800; }

        /* Form Styling */
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 10000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .page.active { display: block; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        h2 { color: var(--gold); text-align: center; font-size: 1.6rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #aaa; margin-right: 5px; }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #111; color: white; font-family: 'Cairo'; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.1); }
        
        .btn-send { background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 12px; width: 100%; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
        .btn-close { background: #222; color: #888; border: none; padding: 12px; border-radius: 12px; width: 100%; margin-top: 15px; font-weight: 600; cursor: pointer; }

        .price-tag { background: #000; border: 2px solid var(--gold); padding: 25px; border-radius: 20px; margin-top: 25px; text-align: center; display: none; }
        .price-value { font-size: 2rem; color: var(--gold); font-weight: 800; display: block; margin: 10px 0; }
    </style>
</head>
<body>

<header>
    <p class="logo-text">ROKAN DESIGN</p>
    <div class="slogan">Luxury Interior Solutions</div>
</header>

<div class="container">
    <div class="hero-img">
        <div class="hero-overlay">أحدث مشاريعنا: أكتوبر 2026</div>
    </div>

    <div class="grid">
        <div class="card" onclick="showPage('calcPage')">
            <i style="color:var(--gold)">📏</i>
            <span>مقايسة ذكية</span>
        </div>
        <div class="card ai-card" onclick="showPage('aiPage')">
            <i>🤖</i>
            <span>مصمم الـ AI</span>
        </div>
        <div class="card" onclick="window.open('https://wa.me/2010XXXXXXXX')">
            <i style="color:#25d366">💬</i>
            <span>تواصل مباشر</span>
        </div>
        <div class="card" onclick="alert('جاري تحميل الكتالوج...')">
            <i style="color:#3498db">🖼️</i>
            <span>سابقة أعمالنا</span>
        </div>
    </div>
</div>

<div id="calcPage" class="page">
    <h2>📐 طلب مقايسة تشطيب</h2>
    <div class="form-group"><label>الاسم بالكامل</label><input type="text" id="custName"></div>
    <div class="form-group"><label>رقم الموبايل</label><input type="tel" id="custPhone"></div>
    <div class="form-group"><label>المساحة (م²)</label><input type="number" id="custArea"></div>
    <div class="form-group">
        <label>باقة التشطيب</label>
        <select id="custPackage">
            <option value="اقتصادية" data-price="3500">الاقتصادية (3,500 ج/م)</option>
            <option value="فضية" data-price="5000">الفضية (5,000 ج/م)</option>
            <option value="ذهبية" data-price="7500">الذهبية (7,500 ج/م)</option>
            <option value="VIP" data-price="11000">VIP (11,000 ج/م)</option>
        </select>
    </div>
    <button class="btn-send" id="submitBtn" onclick="calculateAndSend()">عرض السعر وإرسال</button>
    
    <div id="priceResult" class="price-tag">
        <span style="font-size: 0.9rem;">التكلفة التقديرية</span>
        <span id="totalPrice" class="price-value">0 ج.م</span>
        <button class="btn-send" style="padding:12px; font-size:0.9rem" onclick="window.open('https://wa.me/2010XXXXXXXX')">حجز موعد معاينة</button>
    </div>
    <button class="btn-close" onclick="hidePage('calcPage')">إغلاق</button>
</div>

<div id="aiPage" class="page">
    <h2>🤖 المصمم الذكي</h2>
    <p style="text-align: center; color: #888; font-size: 0.9rem;">اشرح خيالك وسنحوله إلى واقع</p>
    <textarea id="aiDesc" rows="6" placeholder="مثلاً: صالة مودرن، ألوان هادئة، إضاءة مخفية..."></textarea>
    <button class="btn-send" onclick="goToAI()">ابدأ التصميم الآن</button>
    <button class="btn-close" onclick="hidePage('aiPage')">إغلاق</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzqipG71EiR_X7v1L7HgfS2ZVlR_jJC3qqbkqncVsaxfgq1iH8GkSkTqhYBq7iTz79M/exec";

    function showPage(id) { document.getElementById(id).classList.add('active'); }
    function hidePage(id) { document.getElementById(id).classList.remove('active'); }

    function goToAI() {
        const text = document.getElementById('aiDesc').value;
        if(!text) return alert("اكتب وصفاً");
        window.open("https://gemini.google.com/app?prompt=" + encodeURIComponent("اقترح ديكور داخلي لـ " + text), "_blank");
    }

    async function calculateAndSend() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const area = document.getElementById('custArea').value;
        const packSelect = document.getElementById('custPackage');
        const packPrice = packSelect.options[packSelect.selectedIndex].getAttribute('data-price');

        if(!name || !phone || !area) return alert("برجاء إكمال البيانات");

        let total = area * packPrice;
        document.getElementById('totalPrice').innerText = total.toLocaleString() + " ج.م";
        document.getElementById('priceResult').style.display = "block";
        document.getElementById('submitBtn').innerText = "تم إرسال بياناتك ✓";

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ name, phone, area, package: packSelect.value, total })
            });
        } catch (e) { console.log("Sent"); }
    }
</script>

</body>
</html>
