<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ركن ديزاين للتشطيبات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f5f5f5;
color:#333;
line-height:1.6;
}

header{
background:#111;
color:white;
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.hero{
height:90vh;
background:url("https://images.unsplash.com/photo-1600585154340-be6161a56a0") center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
position:relative;
}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:42px;
margin-bottom:15px;
}

.btn{
background:#d4af37;
padding:12px 25px;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
text-decoration:none;
display:inline-block;
margin-top:15px;
}

section{
padding:70px 10%;
}

form{
background:white;
padding:30px;
max-width:500px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

.result-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin:10px 0;
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

</style>

</head>

<body>

<header>

<h2>ركن ديزاين</h2>

</header>


<section class="hero">

<div class="hero-content">

<h1>ركن ديزاين للتشطيبات</h1>

<p>احسب تكلفة تشطيب شقتك خلال ثواني</p>

<a class="btn" href="#calculator">احسب التكلفة</a>

</div>

</section>



<section id="calculator">

<h2 style="text-align:center;margin-bottom:30px;">احسب تكلفة التشطيب</h2>

<form id="costForm">

<input id="name" required placeholder="الاسم">

<input id="phone" required placeholder="رقم الموبايل">

<input id="area" required type="number" placeholder="المساحة بالمتر">



<select id="unit" required>

<option value="">نوع الوحدة</option>

<option>شقة</option>
<option>دوبلكس</option>
<option>فيلا</option>
<option>أرضي بجنينة</option>
<option>مكتب إداري</option>

</select>



<select id="finish" required>

<option value="">حالة التشطيب</option>

<option>محارة وحلوق</option>
<option>طوب احمر</option>
<option>تجديد</option>

</select>



<select id="region" required>

<option value="">المنطقة</option>

<option>الهرم - فيصل</option>
<option>أكتوبر</option>
<option>حدائق اكتوبر</option>
<option>حدائق الأهرام</option>
<option>الشيخ زايد</option>
<option>دريم لاند</option>
<option>الفردوس</option>
<option>الخمائل</option>
<option>العاصمة الإدارية</option>

</select>



<select id="package" required>

<option value="">الباقة</option>

<option>اقتصادية</option>
<option>فضية</option>
<option>ذهبية</option>
<option>VIP</option>

</select>



<select id="metal" required>

<option value="">الموتال</option>

<option>تركيب الموتال</option>
<option>بدون الموتال</option>

</select>


<br>

<button class="btn">احسب التكلفة</button>

</form>

</section>



<footer>

ركن ديزاين للتشطيبات والديكور

</footer>



<script>


const scriptURL="ضع رابط Google Apps Script هنا"



const prices={

"الهرم - فيصل":{اقتصادية:2800,فضية:3500,ذهبية:3800,VIP:4800},

"أكتوبر":{اقتصادية:3200,فضية:3700,ذهبية:4000,VIP:4800},

"حدائق اكتوبر":{اقتصادية:3200,فضية:3700,ذهبية:4000,VIP:4800},

"حدائق الأهرام":{اقتصادية:3200,فضية:3700,ذهبية:4000,VIP:4800},

"الشيخ زايد":{اقتصادية:3500,فضية:3900,ذهبية:4200,VIP:4800},

"دريم لاند":{اقتصادية:3500,فضية:3900,ذهبية:4200,VIP:4800},

"الفردوس":{اقتصادية:3200,فضية:3700,ذهبية:4000,VIP:4800},

"الخمائل":{اقتصادية:3200,فضية:3700,ذهبية:4000,VIP:4800},

"العاصمة الإدارية":{اقتصادية:4200,فضية:4900,ذهبية:5200,VIP:6800}

}



document.getElementById("costForm").addEventListener("submit",function(e){

e.preventDefault()



let name=document.getElementById("name").value

let phone=document.getElementById("phone").value

let area=Number(document.getElementById("area").value)

let unit=document.getElementById("unit").value

let finish=document.getElementById("finish").value

let region=document.getElementById("region").value

let pack=document.getElementById("package").value

let metal=document.getElementById("metal").value



let price=prices[region][pack]



if(finish=="طوب احمر") price+=500



let total=price*area



if(unit=="دوبلكس") total+=70000

if(unit=="فيلا") total+=100000

if(unit=="أرضي بجنينة") total+=25000

if(finish=="تجديد") total+=30000

if(metal=="تركيب الموتال") total+=35000



fetch(scriptURL,{
method:"POST",
body:JSON.stringify({

name:name,

phone:phone,

area:area,

unit:unit,

finish:finish,

region:region,

package:pack,

metal:metal,

total:total

})

})



let message=

`طلب جديد من موقع ركن ديزاين

الاسم: ${name}

الموبايل: ${phone}

المنطقة: ${region}

الباقة: ${pack}

نوع الوحدة: ${unit}

حالة التشطيب: ${finish}

الموتال: ${metal}

المساحة: ${area} متر

السعر المتوقع: ${total} جنيه

تواصل مع العميل الآن`



let whatsapp=

"https://wa.me/201151983638?text="+encodeURIComponent(message)



window.open(whatsapp)



let resultWindow=window.open("","_blank")



resultWindow.document.write(`

<html dir="rtl">

<head>

<meta charset="UTF-8">

<title>نتيجة حساب التكلفة</title>

<style>

body{font-family:Cairo;background:#f5f5f5;padding:30px}

h2{text-align:center;color:#d4af37}

.card{

background:white;

padding:20px;

margin:10px 0;

border-radius:10px;

box-shadow:0 5px 20px rgba(0,0,0,.1)

}

</style>

</head>

<body>

<h2>ملخص التكلفة</h2>

<div class="card">الاسم: ${name}</div>

<div class="card">الموبايل: ${phone}</div>

<div class="card">المنطقة: ${region}</div>

<div class="card">الباقة: ${pack}</div>

<div class="card">نوع الوحدة: ${unit}</div>

<div class="card">حالة التشطيب: ${finish}</div>

<div class="card">الموتال: ${metal}</div>

<div class="card">المساحة: ${area} متر</div>

<div class="card">السعر النهائي: ${total} جنيه</div>

</body>

</html>

`)



})


</script>


</body>

</html>
