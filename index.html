تمام…
الرسالة اللي ظهرت لك: **"رفض play.google.com الاتصال"**
معناها إن الموقع اللي بتحطه داخل `<iframe>` **رافض يسمح بالتضمين** بسبب سياسة *X-Frame-Options*.

🎯 **Planner5D شغّال ومافيش منه مشكلة**
لكن *جوجل بلاي* محظور يظهر داخل iframe، فده معناه إنك — بالغلط — حطيت لينك تاني بدل رابط الـ Editor.

الحل:
استخدم الرابط الصحيح فقط:

```
https://planner5d.com/editor/?key=empty
```

هذا الرابط **يُسمح بتضمينه** ولا يسبب رسالة الرفض.

# 🎁 الكود النهائي للصفحة كلها مدمج فيه أداة الرسم

👇 ابعتهولي الكود الأصلي للصفحة (كل الـ HTML)
وأضيف لك الـ section بالكامل في المكان الصحيح،
وأرجعه لك **جاهز نسخة واحدة** تنسخها فقط.

📌 انت كنت كاتب “ضيف الكود دا لكود الصفحة”
… بس ما أرسلتش كود الصفحة نفسه.

🟢 **ابعتلي الكود كامل للصفحة هنا**
وهركبه لك جاهز بدون أي أخطاء وبدون رسائل رفض.
