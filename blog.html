<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية ركن ديزاين - مرجع التشطيب والديكور 2026</title>
    <meta name="description" content="دليلك الشامل من ركن ديزاين لأصول التشطيب الهندسي، الديكور، والأثاث. مقالات تخصصية تتخطى 1000 كلمة لكل ركن في منزلك.">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DD62NBY3TP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DD62NBY3TP');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #111; --light: #f4f4f4; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; direction: rtl; color: #333; overflow-x: hidden; }
        
        /* Header Section */
        header { background: var(--dark); color: var(--white); padding: 60px 5% 90px; text-align: center; border-bottom: 5px solid var(--gold); }
        header h1 { color: var(--gold); margin: 0; font-size: 28px; font-weight: 700; }
        header p { margin-top: 15px; color: var(--white); font-size: 16px; max-width: 700px; margin-left: auto; margin-right: auto; line-height: 1.7; opacity: 1; }

        /* Search Box Responsive Fix */
        .search-wrapper { 
            width: 90%; 
            max-width: 450px; 
            margin: 0 auto;
            position: relative; 
            top: -35px; 
            z-index: 1100;
        }
        .search-box { 
            width: 100%; 
            padding: 18px 25px 18px 55px; 
            border-radius: 50px; 
            border: 3px solid var(--gold); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            font-size: 16px; 
            outline: none; 
            text-align: right; 
            background: white;
            box-sizing: border-box; /* يمنع خروج العنصر عن الشاشة */
        }
        .search-wrapper i { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 20px; }

        /* Navigation Tabs */
        .category-tabs {
            display: flex; overflow-x: auto; white-space: nowrap;
            padding: 15px 5%; gap: 12px; background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
            scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            padding: 10px 25px; border-radius: 30px; background: #f2f2f2;
            border: none; font-family: 'Cairo', sans-serif; font-size: 14px;
            cursor: pointer; transition: 0.3s; font-weight: 600; color: var(--dark);
        }
        .tab-btn.active { background: var(--gold); color: var(--dark); }

        /* Grid */
        .container { 
            padding: 30px 5% 60px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; 
        }

        /* Blog Card */
        .blog-card { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.07); transition: 0.4s; 
            text-decoration: none; color: inherit; display: flex; flex-direction: column;
            border-bottom: 5px solid transparent;
        }
        .blog-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .blog-card img { width: 100%; height: 220px; object-fit: cover; }
        
        .blog-card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .blog-card-content span { color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 10px; display: block; }
        .blog-card-content h3 { margin: 0 0 12px; font-size: 20px; color: var(--dark); line-height: 1.5; }
        .blog-card-content p { font-size: 15px; color: #555; line-height: 1.8; margin-bottom: 20px; }
        
        .read-more { margin-top: auto; color: var(--gold); font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 8px; }

        /* FAB Button */
        .back-home-fab { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; background: var(--gold); color: var(--dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-decoration: none; z-index: 2000; }
        
        /* Footer */
        footer { background: var(--dark); color: var(--white); text-align: center; padding: 50px 20px; font-size: 14px; border-top: 1px solid #333; }
        footer p { color: var(--white); margin: 8px 0; opacity: 1; }

        @media (max-width: 480px) {
            header h1 { font-size: 24px; }
            .container { grid-template-columns: 1fr; padding: 15px; }
            .search-wrapper { width: 92%; top: -30px; }
            .blog-card img { height: 180px; }
        }
    </style>
</head>
<body>

<header>
    <h1>أكاديمية ركن ديزاين</h1>
    <p>موسوعة التشطيب الشاملة لعام 2026. كل ما تحتاجه لتصميم وتنفيذ بيت العمر بأعلى جودة هندسية.</p>
</header>

<div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن موضوع (أثاث، ستائر، ألوان...)" onkeyup="runFilter()">
</div>

<div class="category-tabs" id="tabsParent">
    <button class="tab-btn active" onclick="filterByCat('الكل', this)">الكل</button>
    <button class="tab-btn" onclick="filterByCat('فرش', this)">فرش وأثاث</button>
    <button class="tab-btn" onclick="filterByCat('ديكور', this)">ديكور</button>
    <button class="tab-btn" onclick="filterByCat('تأسيس', this)">تأسيس</button>
    <button class="tab-btn" onclick="filterByCat('استلام', this)">استلام</button>
</div>

<div class="container" id="articlesGrid"></div>

<a href="index.html" class="back-home-fab"><i class="fas fa-home fa-lg"></i></a>

<footer>
    <img src="https://i.ibb.co/zhgWMbM3/Rokn-Design-Logo.png" alt="ركن ديزاين" style="height: 40px; margin-bottom: 20px; filter: brightness(0) invert(1);">
    <p>جميع الحقوق محفوظة لشركة ركن ديزاين © 2026</p>
    <p>نحن لا نشطب جدران.. نحن نصمم حياة</p>
</footer>

<script>
    const allArticles = [
        {
            id: 17,
            title: "فن الإكسسوارات والمرايا 2026: كيف تنطق الجدران؟",
            desc: "دليل شامل يتخطى 1000 كلمة حول قواعد توزيع المرايا واللوحات الفنية لإعطاء مساحة وفخامة إضافية لشقتك.",
            img: "https://i.ibb.co/v6yXyXyX/Decor-Mirror.png",
            cat: "فرش"
        },
        {
            id: 16,
            title: "دليل الستائر الحديثة 2026 - القماش والأنظمة الذكية",
            desc: "مرجع متكامل حول اختيار أقمشة الكتان، تأسيس بيت الستارة المخفي، وأنظمة الستائر الكهربائية للسمارت هوم.",
            img: "https://i.ibb.co/v6yXyXyX/Curtains-2026.png",
            cat: "ديكور"
        },
        {
            id: 15,
            title: "أسرار اختيار الأثاث المودرن 2026 - الدليل الهندسي",
            desc: "تعلم كيف تختار خامات الخشب والأسفنج وتوزع الأثاث بذكاء لاستغلال المساحات الصغيرة والكبيرة باحترافية.",
            img: "https://i.ibb.co/v6yXyXyX/Furniture-2026.png",
            cat: "فرش"
        },
        {
            id: 14,
            title: "دليل الألوميتال والـ PVC لعام 2026 - أسرار العزل",
            desc: "كيف تختار الشباك المناسب؟ الفرق بين قطاعات الجامبو والتانجو والـ PVC، وأسرار عزل الصوت والحرارة.",
            img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Windows.png",
            cat: "تأسيس"
        },
        {
            id: 13,
            title: "دليل ألوان 2026: باليتة السعادة والهدوء لمنزلك",
            desc: "اكتشف أحدث صيحات ألوان الدهانات لعام 2026، من ألوان الطبيعة الدافئة إلى الـ Greige المطور وتنسيقه.",
            img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Colors2026.png",
            cat: "ديكور"
        },
        { 
            id: 12, 
            title: "دليل النقاشة والدهانات الشامل 2026 - أسرار الفنش", 
            desc: "تعرف على خطوات النقاشة الاحترافية من المعجون حتى الفنش النهائي وأفضل أنواع الدهانات في مصر.", 
            img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Paint.png", 
            cat: "ديكور" 
        },
        { id: 2, title: "سحر لون الفانيلا لاتيه 2026", desc: "لماذا يتربع هذا اللون على عرش الدهانات وكيف تنسقه مع الإضاءة والأثاث بشكل احترافي.", img: "https://i.ibb.co/zhgWMbM3/Rokn-Design-Vanilla-Latte.png", cat: "ديكور" },
        { id: 1, title: "دليل العزل المائي الشامل", desc: "تعرف على أصول العزل المائي للحمامات والمطابخ وكيفية تجنب تسريبات المياه الخطيرة.", img: "https://i.ibb.co/8Lww9B1f/Gemini-Generated-Image-6c2kiw6c2kiw6c2k.png", cat: "تأسيس" }
    ];

    let currentCategory = 'الكل';

    function render() {
        const grid = document.getElementById('articlesGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';
        
        const sortedArticles = [...allArticles].sort((a, b) => b.id - a.id);
        
        sortedArticles.forEach(art => {
            const matchesCat = (currentCategory === 'الكل' || art.cat === currentCategory);
            const matchesSearch = art.title.toLowerCase().includes(searchTerm) || art.desc.toLowerCase().includes(searchTerm);
            
            if (matchesCat && matchesSearch) {
                grid.innerHTML += `
                    <a href="articles/article${art.id}.html" class="blog-card">
                        <img src="${art.img}" alt="${art.title}">
                        <div class="blog-card-content">
                            <span>#${art.cat}</span>
                            <h3>${art.title}</h3>
                            <p>${art.desc}</p>
                            <div class="read-more">إقرأ المرجع الشامل (1000+ كلمة) <i class="fas fa-chevron-left"></i></div>
                        </div>
                    </a>
                `;
            }
        });
        
        if (grid.innerHTML === '') {
            grid.innerHTML = '<div style="text-align:center; padding:50px; grid-column: 1/-1;"><p style="color:#666;">لم نجد نتائج تطابق بحثك، جرب كلمات أخرى.</p></div>';
        }
    }

    function filterByCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function runFilter() { render(); }
    window.onload = render;
</script>

</body>
</html>
