<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية ركن ديزاين | موسوعة التشطيب الهندسية 2026</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DD62NBY3TP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DD62NBY3TP');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #111; --light: #f4f4f4; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; direction: rtl; color: #333; overflow-x: hidden; }
        
        /* Header Section */
        header { background: var(--dark); color: var(--white); padding: 80px 5% 110px; text-align: center; border-bottom: 5px solid var(--gold); }
        header h1 { color: var(--gold); margin: 0; font-size: 34px; font-weight: 700; }
        header p { margin-top: 15px; color: var(--white); font-size: 19px; max-width: 850px; margin-left: auto; margin-right: auto; line-height: 1.8; }

        /* Search Wrapper */
        .search-wrapper { width: 90%; max-width: 550px; margin: 0 auto; position: relative; top: -45px; z-index: 1100; }
        .search-box { width: 100%; padding: 22px 25px 22px 65px; border-radius: 60px; border: 4px solid var(--gold); box-shadow: 0 20px 45px rgba(0,0,0,0.25); font-size: 17px; outline: none; text-align: right; background: white; box-sizing: border-box; }
        .search-wrapper i { position: absolute; left: 30px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 24px; }

        /* Navigation Tabs */
        .category-tabs { display: flex; overflow-x: auto; white-space: nowrap; padding: 15px 5%; gap: 12px; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; scrollbar-width: none; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 12px 28px; border-radius: 35px; background: #eee; border: none; font-family: 'Cairo', sans-serif; font-size: 15px; cursor: pointer; transition: 0.3s; font-weight: 600; color: var(--dark); }
        .tab-btn.active { background: var(--gold); color: var(--dark); }

        /* Grid System */
        .container { padding: 40px 5% 80px; display: grid; grid-template-columns: repeat(auto-fit, minmax(330px, 1fr)); gap: 30px; }

        /* Card Design */
        .blog-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: 0.4s; text-decoration: none; color: inherit; display: flex; flex-direction: column; border-bottom: 6px solid transparent; }
        .blog-card:hover { transform: translateY(-12px); border-color: var(--gold); }
        .blog-card img { width: 100%; height: 240px; object-fit: cover; }
        
        .blog-card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .blog-card-content span { color: var(--gold); font-size: 13px; font-weight: bold; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .blog-card-content h3 { margin: 0 0 12px; font-size: 21px; color: var(--dark); line-height: 1.5; font-weight: 700; }
        .blog-card-content p { font-size: 15px; color: #666; line-height: 1.8; margin-bottom: 22px; height: 80px; overflow: hidden; }
        
        .read-more { margin-top: auto; color: var(--gold); font-weight: bold; font-size: 15px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #eee; padding-top: 15px; }

        /* Floating Action Button */
        .back-home-fab { position: fixed; bottom: 30px; left: 30px; width: 65px; height: 65px; background: var(--gold); color: var(--dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-decoration: none; z-index: 2000; transition: 0.3s; }
        .back-home-fab:hover { transform: scale(1.1); }
        
        /* Footer */
        footer { background: var(--dark); color: var(--white); text-align: center; padding: 60px 20px; font-size: 15px; border-top: 6px solid var(--gold); }
        footer p { color: var(--white); margin: 10px 0; opacity: 1; }

        @media (max-width: 480px) {
            header h1 { font-size: 26px; }
            .container { grid-template-columns: 1fr; padding: 20px; }
            .search-wrapper { width: 92%; top: -40px; }
        }
    </style>
</head>
<body>

<header>
    <h1>أكاديمية ركن ديزاين</h1>
    <p>بوابتك المعرفية لكل تفاصيل التشطيب والديكور. مقالات هندسية متكاملة تشرح لك أصول الصنعة من التأسيس حتى السكن.</p>
</header>

<div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث في 20 مقال تخصصي..." onkeyup="runFilter()">
</div>

<div class="category-tabs" id="tabsParent">
    <button class="tab-btn active" onclick="filterByCat('الكل', this)">الكل</button>
    <button class="tab-btn" onclick="filterByCat('تأسيس', this)">تأسيس</button>
    <button class="tab-btn" onclick="filterByCat('ديكور', this)">ديكور</button>
    <button class="tab-btn" onclick="filterByCat('فرش', this)">فرش وأثاث</button>
    <button class="tab-btn" onclick="filterByCat('استلام', this)">استلام</button>
</div>

<div class="container" id="articlesGrid"></div>

<a href="index.html" class="back-home-fab"><i class="fas fa-home fa-lg"></i></a>

<footer>
    <img src="https://i.ibb.co/zhgWMbM3/Rokn-Design-Logo.png" alt="ركن ديزاين" style="height: 50px; margin-bottom: 25px; filter: brightness(0) invert(1);">
    <p>جميع الحقوق محفوظة لشركة ركن ديزاين © 2026</p>
    <p>الدقة في التنفيذ.. الأمانة في الاستلام</p>
</footer>

<script>
    const allArticles = [
        { id: 20, title: "لا تمضِ على محضر الاستلام! الدليل الشامل", desc: "أكبر مرجع عربي (3000+ كلمة) يكشف أسرار كشف عيوب السباكة والكهرباء والدهانات وكيف تستلم شقتك كمهندس محترف.", img: "https://images.unsplash.com/photo-1503387762-592dea58ef23", cat: "استلام" },
        { id: 19, title: "دليل الحمامات الفندقية 2026", desc: "أسرار الأنظمة المدفونة وكابينات الشاور (1000+ كلمة) لتحويل حمامك الصغير إلى ملاذ للرفاهية والأناقة.", img: "https://images.unsplash.com/photo-1552321554-5fefe8c9ef14", cat: "ديكور" },
        { id: 18, title: "دليل تصميم المطابخ المودرن 2026", desc: "هندسة مثلث الحركة وخامات الـ HPL والـ Poly-lac. دليل دسم (1000+ كلمة) لضمان مطبخ عملي وشيك.", img: "https://images.unsplash.com/photo-1556911220-e15b29be8c8f", cat: "ديكور" },
        { id: 17, title: "فن الإكسسوارات والمرايا 2026", desc: "كيف تعطي منزلك لمحة الفنادق الكبرى عبر التوزيع الذكي للمرايا واللوحات الفنية والإضاءة الجانبية.", img: "https://i.ibb.co/v6yXyXyX/Decor-Mirror.png", cat: "فرش" },
        { id: 16, title: "دليل الستائر الحديثة والأنظمة الذكية", desc: "كل ما تود معرفته عن أقمشة الكتان، بيت الستارة المخفي، وأنظمة التحكم عن بعد (سمارت هوم).", img: "https://i.ibb.co/v6yXyXyX/Curtains-2026.png", cat: "ديكور" },
        { id: 15, title: "أسرار اختيار الأثاث المودرن 2026", desc: "قواعد اختيار الأخشاب والأقمشة لضمان عمر افتراضي طويل وأناقة لا تنتهي مع مرور الزمن.", img: "https://i.ibb.co/v6yXyXyX/Furniture-2026.png", cat: "فرش" },
        { id: 14, title: "دليل الألوميتال والـ PVC العالمي", desc: "الفرق بين قطاعات الجامبو والتانجو وأهمية عزل الصوت والحرارة في شبابيك منزلك.", img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Windows.png", cat: "تأسيس" },
        { id: 13, title: "دليل ألوان 2026: باليتة السعادة", desc: "أحدث صيحات ألوان الدهانات (Vanilla Latte - Greige) وكيفية تنسيقها مع الإضاءة والفرش.", img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Colors2026.png", cat: "ديكور" },
        { id: 12, title: "دليل النقاشة والدهانات الشامل", desc: "مراحل التنفيذ الهندسي من سحب المعجون حتى الفنش النهائي وأفضل أنواع الخامات المعتمدة.", img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Paint.png", cat: "ديكور" },
        { id: 11, title: "سحر توزيع الإضاءة الحديثة", desc: "تجنب أخطاء الإضاءة الشائعة وتعلم توزيع الليد بروفايل والسبوتات لإبراز جمال الديكور.", img: "https://i.ibb.co/689N9P9F/Gemini-Generated-Image-Lighting.png", cat: "ديكور" },
        { id: 10, title: "أبواب الخشب: الزان والسويدي", desc: "كيف تختار أبواب شقتك؟ دليلك لمعرفة الفرق بين الأخشاب الطبيعية والمصنعة وأسرار النجارة.", img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Wood-Door.png", cat: "فرش" },
        { id: 9, title: "تأسيس التكييف وتجنب التكسير", desc: "القواعد الهندسية لتأسيس مسارات النحاس وصرف المياه لحماية حوائطك من الرطوبة والتكسير مستقبلاً.", img: "https://images.unsplash.com/photo-1563453392212-326f5e854473", cat: "تأسيس" },
        { id: 8, title: "أصول تركيب الجبس بورد", desc: "تجنب شروخ الأسقف للأبد عبر اتباع المواصفات الفنية للهيكل المعدني وطرق التدعيم الصحيحة.", img: "https://images.unsplash.com/photo-1513694203232-719a280e022f", cat: "استلام" },
        { id: 7, title: "السيراميك والبورسلين 2026", desc: "أيهما أفضل لشقتك؟ وكيف تضمن تركيب البورسلين بمواد اللصق الصحيحة لمنع خروجه من مكانه.", img: "https://images.unsplash.com/photo-1618219908412-a29a1bb7b86e", cat: "ديكور" },
        { id: 6, title: "أصول تأسيس السباكة والضغط", desc: "أهم بند في التشطيب. كيف تضمن سباكة آمنة مدى الحياة مع شهادة ضمان معتمدة من الشركة.", img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a", cat: "تأسيس" },
        { id: 5, title: "بديل الرخام والخشب الذكي", desc: "فخامة الخامات الطبيعية بأسعار اقتصادية. مميزات وعيوب بدائل الرخام والخشب في الديكور الحديث.", img: "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6", cat: "ديكور" },
        { id: 4, title: "تأسيس الكهرباء وأمان المنزل", desc: "توزيع لوحة المفاتيح واختيار أقطار الأسلاك السويدي الأصلية لحماية منزلك من مخاطر التماس.", img: "https://images.unsplash.com/photo-1558002038-1055907df827", cat: "تأسيس" },
        { id: 3, title: "أسرار المحارة الهندسية", desc: "لماذا نستخدم الأوتار والزوايا المعدنية؟ سر الحصول على حوائط مستوية تماماً قبل الدهانات.", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f", cat: "تأسيس" },
        { id: 2, title: "سحر لون الفانيلا لاتيه", desc: "اللون التريند الذي يعطي اتساعاً وفخامة. كيف تنسقه مع الإضاءة الدافئة والبيضاء.", img: "https://i.ibb.co/zhgWMbM3/Rokn-Design-Vanilla-Latte.png", cat: "ديكور" },
        { id: 1, title: "دليل العزل المائي الشامل", desc: "حماية حمامك ومطبخك من كارثة تسريب المياه. أفضل المواد الكيميائية وطرق الاختبار.", img: "https://i.ibb.co/8Lww9B1f/Gemini-Generated-Image-6c2kiw6c2kiw6c2k.png", cat: "تأسيس" }
    ];

    let currentCategory = 'الكل';

    function render() {
        const grid = document.getElementById('articlesGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';
        
        // ترتيب تنازلي حسب ID (الأحدث أولاً)
        const sortedArticles = [...allArticles].sort((a, b) => b.id - a.id);
        
        sortedArticles.forEach(art => {
            const matchesCat = (currentCategory === 'الكل' || art.cat === currentCategory);
            const matchesSearch = art.title.toLowerCase().includes(searchTerm) || art.desc.toLowerCase().includes(searchTerm);
            
            if (matchesCat && matchesSearch) {
                grid.innerHTML += `
                    <a href="articles/article${art.id}.html" class="blog-card">
                        <img src="${art.img}" alt="${art.title}">
                        <div class="blog-card-content">
                            <span>#${art.cat}</span>
                            <h3>${art.title}</h3>
                            <p>${art.desc}</p>
                            <div class="read-more">قراءة المرجع الهندسي <i class="fas fa-chevron-left"></i></div>
                        </div>
                    </a>
                `;
            }
        });
        
        if (grid.innerHTML === '') {
            grid.innerHTML = '<div style="text-align:center; padding:50px; grid-column: 1/-1;"><p style="color:#666; font-size:18px;">لا توجد مقالات مطابقة لبحثك.</p></div>';
        }
    }

    function filterByCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function runFilter() { render(); }
    window.onload = render;
</script>

</body>
</html>
