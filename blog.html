<script src="articles-data.js"></script>

<script>
    let currentCategory = 'الكل';

    function render() {
        const grid = document.getElementById('articlesGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';

        // "allArticles" دلوقتي جاية من الملف الخارجي
        allArticles.forEach(art => {
            const matchesCat = (currentCategory === 'الكل' || art.cat === currentCategory);
            const matchesSearch = art.title.toLowerCase().includes(searchTerm);

            if (matchesCat && matchesSearch) {
                grid.innerHTML += `
                    <a href="articles/article${art.id}.html" class="blog-card">
                        <img src="${art.img}" alt="${art.title}">
                        <div class="blog-card-content">
                            <h3>${art.title}</h3>
                            <p>${art.desc}</p>
                        </div>
                    </a>
                `;
            }
        });
    }

    function filterByCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function runFilter() { render(); }
    window.onload = render;
</script>
