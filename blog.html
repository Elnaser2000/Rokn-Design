<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية ركن ديزاين - الموسوعة الشاملة للتشطيب 2026</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DD62NBY3TP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DD62NBY3TP');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #111; --light: #f4f4f4; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; direction: rtl; color: #333; overflow-x: hidden; }
        
        /* Header */
        header { background: var(--dark); color: var(--white); padding: 60px 5% 90px; text-align: center; border-bottom: 5px solid var(--gold); }
        header h1 { color: var(--gold); margin: 0; font-size: 28px; font-weight: 700; }
        header p { margin-top: 15px; color: var(--white); font-size: 16px; max-width: 700px; margin-left: auto; margin-right: auto; line-height: 1.7; opacity: 1; }

        /* Search Box Fixed */
        .search-wrapper { 
            width: 90%; 
            max-width: 420px; 
            margin: 0 auto;
            position: relative; 
            top: -35px; 
            z-index: 1100;
        }
        .search-box { 
            width: 100%; 
            padding: 18px 25px 18px 55px; 
            border-radius: 50px; 
            border: 3px solid var(--gold); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            font-size: 16px; 
            outline: none; 
            text-align: right; 
            background: white;
            box-sizing: border-box;
        }
        .search-wrapper i { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 20px; }

        /* Tabs */
        .category-tabs {
            display: flex; overflow-x: auto; white-space: nowrap;
            padding: 15px 5%; gap: 10px; background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
            scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            padding: 10px 22px; border-radius: 30px; background: #f2f2f2;
            border: none; font-family: 'Cairo', sans-serif; font-size: 14px;
            cursor: pointer; transition: 0.3s; font-weight: 600; color: var(--dark);
        }
        .tab-btn.active { background: var(--gold); color: var(--dark); }

        /* Container */
        .container { 
            padding: 30px 5% 60px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(310px, 1fr)); 
            gap: 25px; 
        }

        /* Card */
        .blog-card { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.07); transition: 0.4s; 
            text-decoration: none; color: inherit; display: flex; flex-direction: column;
            border-bottom: 5px solid transparent;
        }
        .blog-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .blog-card img { width: 100%; height: 210px; object-fit: cover; }
        
        .blog-card-content { padding: 22px; flex-grow: 1; display: flex; flex-direction: column; }
        .blog-card-content span { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 8px; display: block; }
        .blog-card-content h3 { margin: 0 0 10px; font-size: 19px; color: var(--dark); line-height: 1.5; }
        .blog-card-content p { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 18px; }
        
        .read-more { margin-top: auto; color: var(--gold); font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }

        /* FAB */
        .back-home-fab { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; background: var(--gold); color: var(--dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); text-decoration: none; z-index: 2000; }
        
        /* Footer */
        footer { background: var(--dark); color: var(--white); text-align: center; padding: 50px 20px; font-size: 14px; border-top: 1px solid #333; }
        footer p { color: var(--white); margin: 8px 0; opacity: 1; }

        @media (max-width: 480px) {
            header h1 { font-size: 24px; }
            .container { grid-template-columns: 1fr; padding: 15px; }
            .search-wrapper { width: 92%; top: -30px; }
        }
    </style>
</head>
<body>

<header>
    <h1>أكاديمية ركن ديزاين</h1>
    <p>أكبر مرجع عربي متخصص في أصول التشطيب الهندسي والديكور. مقالات تعليمية دسمة لضمان جودة بيت العمر.</p>
</header>

<div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث في 17 مقال تخصصي..." onkeyup="runFilter()">
</div>

<div class="category-tabs" id="tabsParent">
    <button class="tab-btn active" onclick="filterByCat('الكل', this)">الكل</button>
    <button class="tab-btn" onclick="filterByCat('تأسيس', this)">تأسيس</button>
    <button class="tab-btn" onclick="filterByCat('ديكور', this)">ديكور</button>
    <button class="tab-btn" onclick="filterByCat('فرش', this)">فرش وأثاث</button>
    <button class="tab-btn" onclick="filterByCat('استلام', this)">استلام</button>
</div>

<div class="container" id="articlesGrid"></div>

<a href="index.html" class="back-home-fab"><i class="fas fa-home fa-lg"></i></a>

<footer>
    <img src="https://i.ibb.co/zhgWMbM3/Rokn-Design-Logo.png" alt="ركن ديزاين" style="height: 40px; margin-bottom: 20px; filter: brightness(0) invert(1);">
    <p>جميع الحقوق محفوظة لشركة ركن ديزاين © 2026</p>
    <p>نحن نبني حكاية لكل ركن في منزلك</p>
</footer>

<script>
    const allArticles = [
        { id: 17, title: "فن الإكسسوارات والمرايا 2026", desc: "مرجع شامل (1000+ كلمة) عن قواعد توزيع المرايا واللوحات لإعطاء فخامة واتساع للمساحات.", img: "https://i.ibb.co/v6yXyXyX/Decor-Mirror.png", cat: "فرش" },
        { id: 16, title: "دليل الستائر الحديثة والأنظمة الذكية", desc: "دليل فني دسم عن أقمشة الكتان وتأسيس بيت الستارة المخفي وأنظمة السمارت هوم.", img: "https://i.ibb.co/v6yXyXyX/Curtains-2026.png", cat: "ديكور" },
        { id: 15, title: "أسرار اختيار الأثاث المودرن 2026", desc: "أكثر من 1000 كلمة تشرح كيفية اختيار الأخشاب وتوزيع الأثاث بذكاء هندسي.", img: "https://i.ibb.co/v6yXyXyX/Furniture-2026.png", cat: "فرش" },
        { id: 14, title: "دليل الألوميتال والـ PVC العالمي", desc: "كل ما تريد معرفته عن قطاعات الجامبو والتانجو وأسرار عزل الصوت والحرارة.", img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Windows.png", cat: "تأسيس" },
        { id: 13, title: "دليل ألوان 2026: باليتة السعادة", desc: "تنسيق ألوان الدهانات الحديثة من درجات الـ Greige والمواد الطبيعية الدافئة.", img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Colors2026.png", cat: "ديكور" },
        { id: 12, title: "دليل النقاشة والدهانات الشامل", desc: "خطوات التنفيذ من المعجون حتى الفنش النهائي وأفضل أنواع جوتن وجي ال سي.", img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Paint.png", cat: "ديكور" },
        { id: 11, title: "سحر توزيع الإضاءة الحديثة", desc: "تعلم طبقات الإضاءة الثلاث وكيفية توزيع الليد بروفايل والسبوتات باحترافية.", img: "https://i.ibb.co/689N9P9F/Gemini-Generated-Image-Lighting.png", cat: "ديكور" },
        { id: 10, title: "أبواب الخشب: الزان والسويدي", desc: "كيف تفرق بين أنواع الخشب وأسرار استلام النجارة لضمان عدم تريح الأبواب.", img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Wood-Door.png", cat: "فرش" },
        { id: 9, title: "تأسيس التكييف وتجنب التكسير", desc: "دليل حماية الحوائط من تنقيط المياه وتأسيس مسارات النحاس بشكل هندسي.", img: "https://images.unsplash.com/photo-1563453392212-326f5e854473", cat: "تأسيس" },
        { id: 8, title: "أصول تركيب الجبس بورد", desc: "تجنب شروخ الأسقف وأهمية الهيكل المعدني في استواء السقف للأبد.", img: "https://images.unsplash.com/photo-1513694203232-719a280e022f", cat: "استلام" },
        { id: 7, title: "السيراميك والبورسلين 2026", desc: "معايير ركن ديزاين في اختيار الأرضيات والفرق الجوهري في طرق التركيب.", img: "https://images.unsplash.com/photo-1618219908412-a29a1bb7b86e", cat: "ديكور" },
        { id: 6, title: "أصول تأسيس السباكة والضغط", desc: "كيف تضمن سباكة خالية من التسريبات مدى الحياة مع شهادات الضمان.", img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a", cat: "تأسيس" },
        { id: 5, title: "بديل الرخام والخشب الذكي", desc: "فخامة الرخام ودفء الخشب بتكلفة اقتصادية ومميزات عملية مذهلة.", img: "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6", cat: "ديكور" },
        { id: 4, title: "تأسيس الكهرباء وأمان المنزل", desc: "توزيع الأحمال واختيار أقطار الأسلاك المناسبة لحماية منزلك من المخاطر.", img: "https://images.unsplash.com/photo-1558002038-1055907df827", cat: "تأسيس" },
        { id: 3, title: "أسرار المحارة الهندسية", desc: "لماذا نعتمد المحارة بالأوتار لضمان زوايا قائمة وحوائط مستوية تماماً.", img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f", cat: "تأسيس" },
        { id: 2, title: "سحر لون الفانيلا لاتيه", desc: "اللون الأكثر طلباً وكيفية تنسيقه مع الإضاءة الصفراء والبيضاء.", img: "https://i.ibb.co/zhgWMbM3/Rokn-Design-Vanilla-Latte.png", cat: "ديكور" },
        { id: 1, title: "دليل العزل المائي الشامل", desc: "حماية الحمامات والمطابخ من تسريبات المياه الخطيرة بأفضل المواد.", img: "https://i.ibb.co/8Lww9B1f/Gemini-Generated-Image-6c2kiw6c2kiw6c2k.png", cat: "تأسيس" }
    ];

    let currentCategory = 'الكل';

    function render() {
        const grid = document.getElementById('articlesGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';
        
        const sortedArticles = [...allArticles].sort((a, b) => b.id - a.id);
        
        sortedArticles.forEach(art => {
            const matchesCat = (currentCategory === 'الكل' || art.cat === currentCategory);
            const matchesSearch = art.title.toLowerCase().includes(searchTerm) || art.desc.toLowerCase().includes(searchTerm);
            
            if (matchesCat && matchesSearch) {
                grid.innerHTML += `
                    <a href="articles/article${art.id}.html" class="blog-card">
                        <img src="${art.img}" alt="${art.title}">
                        <div class="blog-card-content">
                            <span>#${art.cat}</span>
                            <h3>${art.title}</h3>
                            <p>${art.desc}</p>
                            <div class="read-more">إقرأ التفاصيل <i class="fas fa-chevron-left"></i></div>
                        </div>
                    </a>
                `;
            }
        });
        
        if (grid.innerHTML === '') {
            grid.innerHTML = '<div style="text-align:center; padding:50px; grid-column: 1/-1;"><p style="color:#666;">لا توجد نتائج بحث مطابقة.</p></div>';
        }
    }

    function filterByCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function runFilter() { render(); }
    window.onload = render;
</script>

</body>
</html>
