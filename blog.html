<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية ركن ديزاين - مرجع التشطيب والديكور في مصر</title>
    <meta name="description" content="اقرأ مقالات تخصصية في أصول التشطيب الهندي، الديكور، وتأسيس الكهرباء والسباكة. دليلك الشامل من ركن ديزاين لبيت العمر.">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DD62NBY3TP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DD62NBY3TP');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #111; --light: #f4f4f4; }
        body { font-family: 'Cairo', sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; direction: rtl; color: #333; }
        
        /* Header Section */
        header { background: var(--dark); color: white; padding: 40px 5% 70px; text-align: center; border-bottom: 4px solid var(--gold); }
        header h1 { color: var(--gold); margin: 0; font-size: 28px; font-weight: 700; }
        header p { margin-top: 10px; opacity: 0.8; font-size: 16px; max-width: 600px; margin-left: auto; margin-right: auto; }

        /* Navigation Tabs */
        .category-tabs {
            display: flex; overflow-x: auto; white-space: nowrap;
            padding: 20px 5%; gap: 12px; background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
        }
        .category-tabs::-webkit-scrollbar { height: 5px; }
        .category-tabs::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .tab-btn {
            padding: 10px 25px; border-radius: 25px; background: #f0f0f0;
            border: none; font-family: 'Cairo', sans-serif; font-size: 14px;
            cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .tab-btn.active { background: var(--gold); color: var(--dark); box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }

        /* Search Box */
        .search-wrapper { 
            max-width: 350px; margin-right: 5%; margin-left: auto; 
            position: relative; top: -30px; z-index: 1100;
        }
        .search-box { 
            width: 100%; padding: 15px 20px 15px 50px; border-radius: 40px; 
            border: 3px solid var(--gold); box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            font-size: 15px; outline: none; text-align: right; background: white;
        }
        .search-wrapper i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 18px; }

        /* Grid Layout */
        .container { 
            padding: 20px 5% 50px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
        }

        /* Card Design */
        .blog-card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 6px 18px rgba(0,0,0,0.06); transition: 0.4s; 
            text-decoration: none; color: inherit; display: flex; flex-direction: column;
            border-bottom: 4px solid transparent;
        }
        .blog-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .blog-card img { width: 100%; height: 210px; object-fit: cover; transition: 0.5s; }
        .blog-card:hover img { scale: 1.05; }
        
        .blog-card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .blog-card-content span { color: var(--gold); font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .blog-card-content h3 { margin: 0 0 12px; font-size: 19px; color: var(--dark); line-height: 1.4; }
        .blog-card-content p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 15px; }
        
        .read-more { margin-top: auto; color: var(--gold); font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }

        /* Floating Button */
        .back-home-fab { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; background: var(--gold); color: var(--dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.2); text-decoration: none; z-index: 2000; transition: 0.3s; }
        .back-home-fab:hover { transform: rotate(360deg) scale(1.1); }
        
        footer { background: var(--dark); color: #888; text-align: center; padding: 40px; font-size: 13px; border-top: 1px solid #333; }
    </style>
</head>
<body>

<header>
    <h1>أكاديمية ركن ديزاين</h1>
    <p>تعلم أصول التشطيب الهندي والديكور من خبراء التنفيذ. مقالات تفصيلية لكل بند في شقتك.</p>
</header>

<div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن بند تشطيب (سباكة، نقاشة...)" onkeyup="runFilter()">
</div>

<div class="category-tabs" id="tabsParent">
    <button class="tab-btn active" onclick="filterByCat('الكل', this)">الكل</button>
    <button class="tab-btn" onclick="filterByCat('تأسيس', this)">تأسيس</button>
    <button class="tab-btn" onclick="filterByCat('ديكور', this)">ديكور</button>
    <button class="tab-btn" onclick="filterByCat('استلام', this)">استلام</button>
    <button class="tab-btn" onclick="filterByCat('فرش', this)">فرش</button>
</div>

<div class="container" id="articlesGrid"></div>

<a href="index.html" class="back-home-fab"><i class="fas fa-home fa-lg"></i></a>

<footer>
    <img src="https://i.ibb.co/zhgWMbM3/Rokn-Design-Logo.png" alt="ركن ديزاين" style="height: 40px; margin-bottom: 15px; filter: grayscale(1); opacity: 0.5;">
    <p>جميع الحقوق محفوظة لشركة ركن ديزاين © 2026</p>
    <p style="margin-top: 5px;">خلى كل ركن يتكلم عنك</p>
</footer>

<script>
    const allArticles = [
        {
            id: 12,
            title: "دليل النقاشة والدهانات الشامل 2026 - أسرار الفنش",
            desc: "تعرف على خطوات النقاشة الاحترافية من المعجون حتى الفنش النهائي، وأفضل أنواع الدهانات (جوتن وجي ال سي) في السوق المصري.",
            img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Paint.png",
            cat: "ديكور"
        },
        {
            id: 11,
            title: "سحر الإضاءة: كيف تحول منزلك للوحة فنية؟",
            desc: "تعرف على طبقات الإضاءة الثلاث وكيفية توزيع السبوتات والليد بروفايل لإبراز جمال ديكورات منزلك.",
            img: "https://i.ibb.co/689N9P9F/Gemini-Generated-Image-Lighting.png",
            cat: "ديكور"
        },
        {
            id: 10,
            title: "أبواب الخشب: كيف تفرق بين الزان والسويدي والكبس؟",
            desc: "دليل ركن ديزاين لاختيار أبواب الغرف، الفرق بين أنواع الخشب، وأسرار الاستلام لضمان عدم تريح الأبواب.",
            img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Wood-Door.png",
            cat: "فرش"
        },
        {
            id: 9,
            title: "تأسيس التكييف: تجنب التكسير وتنقيط المياه",
            desc: "كيف تحمي حوائط منزلك ودهاناتك من مشاكل صرف التكييف وتأسيس النحاس الخاطئ؟ دليل ركن ديزاين الشامل.",
            img: "https://images.unsplash.com/photo-1563453392212-326f5e854473",
            cat: "تأسيس"
        },
        {
            id: 8,
            title: "أصول تركيب الجبس بورد واستلام الأسقف",
            desc: "تعرف على كيفية تجنب شروخ الجبس بورد وأهمية الهيكل المعدني في ضمان استواء السقف للأبد.",
            img: "https://images.unsplash.com/photo-1513694203232-719a280e022f",
            cat: "استلام"
        },
        {
            id: 7,
            title: "أسرار اختيار وتركيب السيراميك والبورسلين",
            desc: "كيف تختار الأرضية المناسبة لمنزلك؟ تعرف على الفرق بين السيراميك والبورسلين ومعايير ركن ديزاين في الاستلام.",
            img: "https://images.unsplash.com/photo-1618219908412-a29a1bb7b86e",
            cat: "ديكور"
        },
        {
            id: 6,
            title: "أصول تأسيس السباكة واختبار الضغط",
            desc: "كيف تضمن سباكة خالية من التسريبات مدى الحياة؟ تعرف على معايير ركن ديزاين في الاستلام والضمان.",
            img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a",
            cat: "تأسيس"
        },
        {
            id: 5,
            title: "بديل الرخام والخشب: فخامة ذكية",
            desc: "كيف تحصل على مظهر الرخام الطبيعي ودفء الخشب بتكلفة اقتصادية ومميزات عملية.",
            img: "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6",
            cat: "ديكور"
        },
        {
            id: 4,
            title: "تأسيس الكهرباء وأمان منزلك",
            desc: "دليل توزيع الأحمال واختيار أقطار الأسلاك المناسبة لحماية بيتك من مخاطر الكهرباء.",
            img: "https://images.unsplash.com/photo-1558002038-1055907df827",
            cat: "تأسيس"
        },
        {
            id: 3,
            title: "أسرار المحارة الهندسية",
            desc: "لماذا نصر في ركن ديزاين على المحارة الهندسية لضمان زوايا قائمة وحوائط مستوية.",
            img: "https://images.unsplash.com/photo-1589939705384-5185137a7f0f",
            cat: "تأسيس"
        },
        {
            id: 2,
            title: "سحر لون الفانيلا لاتيه 2026",
            desc: "لماذا يتربع هذا اللون على عرش الدهانات وكيف تنسقه مع الإضاءة والأثاث بشكل احترافي.",
            img: "https://i.ibb.co/zhgWMbM3/Rokn-Design-Vanilla-Latte.png",
            cat: "ديكور"
        },
        {
            id: 1,
            title: "دليل العزل المائي الشامل",
            desc: "تعرف على أصول العزل المائي للحمامات والمطابخ وكيفية تجنب تسريبات المياه الخطيرة.",
            img: "https://i.ibb.co/8Lww9B1f/Gemini-Generated-Image-6c2kiw6c2kiw6c2k.png",
            cat: "تأسيس"
        }
    ];

    let currentCategory = 'الكل';

    function render() {
        const grid = document.getElementById('articlesGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';

        const sortedArticles = [...allArticles].sort((a, b) => b.id - a.id);

        sortedArticles.forEach(art => {
            const matchesCat = (currentCategory === 'الكل' || art.cat === currentCategory);
            const matchesSearch = art.title.toLowerCase().includes(searchTerm) || art.desc.toLowerCase().includes(searchTerm);

            if (matchesCat && matchesSearch) {
                grid.innerHTML += `
                    <a href="articles/article${art.id}.html" class="blog-card">
                        <img src="${art.img}" alt="${art.title}">
                        <div class="blog-card-content">
                            <span>#${art.cat}</span>
                            <h3>${art.title}</h3>
                            <p>${art.desc}</p>
                            <div class="read-more">إقرأ المقال كاملاً <i class="fas fa-chevron-left"></i></div>
                        </div>
                    </a>
                `;
            }
        });

        if (grid.innerHTML === '') {
            grid.innerHTML = '<div style="text-align:center; padding:50px; grid-column: 1/-1;"><i class="fas fa-search fa-3x" style="color:#ddd; margin-bottom:15px;"></i><p style="color:#666;">لم نجد مقالات بهذا الاسم، جرب كلمة أخرى.</p></div>';
        }
    }

    function filterByCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function runFilter() { render(); }
    window.onload = render;
</script>

</body>
</html>
