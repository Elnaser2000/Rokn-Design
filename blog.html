<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية ركن ديزاين - مرجع التشطيب والديكور في مصر</title>
    <meta name="description" content="اقرأ مقالات تخصصية في أصول التشطيب الهندي، الديكور، وتأسيس الكهرباء والسباكة. دليلك الشامل من ركن ديزاين لبيت العمر.">
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DD62NBY3TP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DD62NBY3TP');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; --dark: #111; --light: #f4f4f4; --white: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--light); margin: 0; padding-bottom: 100px; direction: rtl; color: #333; overflow-x: hidden; }
        
        /* Header Section */
        header { background: var(--dark); color: var(--white); padding: 50px 5% 80px; text-align: center; border-bottom: 4px solid var(--gold); }
        header h1 { color: var(--gold); margin: 0; font-size: 26px; font-weight: 700; }
        header p { margin-top: 12px; color: var(--white); font-size: 15px; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.6; opacity: 1; }

        /* Search Wrapper - تم ضبطه للموبايل */
        .search-wrapper { 
            width: 85%; 
            max-width: 380px; 
            margin: 0 auto;
            position: relative; 
            top: -30px; 
            z-index: 1100;
        }
        .search-box { 
            width: 100%; 
            padding: 15px 20px 15px 50px; 
            border-radius: 40px; 
            border: 3px solid var(--gold); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            font-size: 15px; 
            outline: none; 
            text-align: right; 
            background: white;
            box-sizing: border-box;
        }
        .search-wrapper i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 18px; }

        /* Navigation Tabs */
        .category-tabs {
            display: flex; overflow-x: auto; white-space: nowrap;
            padding: 15px 5%; gap: 10px; background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
            scrollbar-width: none; /* للهيدن في فايرفوكس */
        }
        .category-tabs::-webkit-scrollbar { display: none; } /* للهيدن في كروم */

        .tab-btn {
            padding: 8px 20px; border-radius: 25px; background: #f0f0f0;
            border: none; font-family: 'Cairo', sans-serif; font-size: 13px;
            cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .tab-btn.active { background: var(--gold); color: var(--dark); }

        /* Grid Layout */
        .container { 
            padding: 20px 5% 50px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; 
        }

        /* Card Design */
        .blog-card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 6px 18px rgba(0,0,0,0.06); transition: 0.4s; 
            text-decoration: none; color: inherit; display: flex; flex-direction: column;
            border-bottom: 4px solid transparent;
        }
        .blog-card:hover { transform: translateY(-8px); border-color: var(--gold); }
        .blog-card img { width: 100%; height: 200px; object-fit: cover; }
        
        .blog-card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .blog-card-content span { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 8px; display: block; }
        .blog-card-content h3 { margin: 0 0 10px; font-size: 18px; color: var(--dark); line-height: 1.5; }
        .blog-card-content p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 15px; }
        
        .read-more { margin-top: auto; color: var(--gold); font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }

        /* Floating Button */
        .back-home-fab { position: fixed; bottom: 25px; left: 25px; width: 55px; height: 55px; background: var(--gold); color: var(--dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.2); text-decoration: none; z-index: 2000; }
        
        /* Footer */
        footer { background: var(--dark); color: var(--white); text-align: center; padding: 40px 20px; font-size: 13px; border-top: 1px solid #333; }
        footer p { color: var(--white); margin: 5px 0; opacity: 1; }

        @media (max-width: 480px) {
            header h1 { font-size: 22px; }
            .container { grid-template-columns: 1fr; padding: 15px; }
            .search-wrapper { width: 90%; top: -25px; }
        }
    </style>
</head>
<body>

<header>
    <h1>أكاديمية ركن ديزاين</h1>
    <p>أسرار التشطيب الهندسي والديكور من خبراء التنفيذ. دليلك الشامل لفرش وتجهيز بيت العمر.</p>
</header>

<div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن (ألوان، ستائر، ألوميتال...)" onkeyup="runFilter()">
</div>

<div class="category-tabs" id="tabsParent">
    <button class="tab-btn active" onclick="filterByCat('الكل', this)">الكل</button>
    <button class="tab-btn" onclick="filterByCat('تأسيس', this)">تأسيس</button>
    <button class="tab-btn" onclick="filterByCat('ديكور', this)">ديكور</button>
    <button class="tab-btn" onclick="filterByCat('فرش', this)">فرش</button>
    <button class="tab-btn" onclick="filterByCat('استلام', this)">استلام</button>
</div>

<div class="container" id="articlesGrid"></div>

<a href="index.html" class="back-home-fab"><i class="fas fa-home fa-lg"></i></a>

<footer>
    <img src="https://i.ibb.co/zhgWMbM3/Rokn-Design-Logo.png" alt="ركن ديزاين" style="height: 35px; margin-bottom: 15px; filter: brightness(0) invert(1);">
    <p>جميع الحقوق محفوظة لشركة ركن ديزاين © 2026</p>
    <p>خلى كل ركن يتكلم عنك</p>
</footer>

<script>
    const allArticles = [
        {
            id: 17,
            title: "فن الإكسسوارات والمرايا: كيف تنطق جدران منزلك؟",
            desc: "أسرار توزيع المرايا واللوحات الفنية لإعطاء مساحة وفخامة إضافية لشقتك بعد التشطيب.",
            img: "https://i.ibb.co/v6yXyXyX/Decor-Mirror.png",
            cat: "فرش"
        },
        {
            id: 16,
            title: "دليل الستائر الحديثة 2026 - كيف تختار القماش والموديل؟",
            desc: "تعرف على أحدث صيحات الستائر المخفية وأقمشة الكتان التي تمنح منزلك لمسة فندقية.",
            img: "https://i.ibb.co/v6yXyXyX/Curtains-2026.png",
            cat: "ديكور"
        },
        {
            id: 15,
            title: "دليل اختيار الأثاث المودرن 2026 - أسرار الخامات",
            desc: "كيف تفرش بيتك بذكاء؟ نصائح ركن ديزاين لاختيار الأخشاب والأقمشة وتوزيع الأثاث بشكل انسيابي.",
            img: "https://i.ibb.co/v6yXyXyX/Furniture-2026.png",
            cat: "فرش"
        },
        {
            id: 14,
            title: "دليل الألوميتال والـ PVC لعام 2026 - أسرار العزل",
            desc: "كيف تختار الشباك المناسب لمنزلك؟ الفرق بين قطاعات الجامبو والتانجو والـ PVC، وأسرار عزل الصوت والحرارة.",
            img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Windows.png",
            cat: "تأسيس"
        },
        {
            id: 13,
            title: "دليل ألوان 2026: باليتة السعادة والهدوء لمنزلك",
            desc: "اكتشف أحدث صيحات ألوان الدهانات لعام 2026، من ألوان الطبيعة الدافئة إلى الـ Greige المطور.",
            img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Colors2026.png",
            cat: "ديكور"
        },
        { id: 12, title: "دليل النقاشة والدهانات الشامل 2026 - أسرار الفنش", desc: "تعرف على خطوات النقاشة الاحترافية من المعجون حتى الفنش النهائي وأفضل أنواع الدهانات.", img: "https://i.ibb.co/v6yXyXyX/Gemini-Generated-Image-Paint.png", cat: "ديكور" },
        { id: 11, title: "سحر الإضاءة: كيف تحول منزلك للوحة فنية؟", desc: "تعرف على طبقات الإضاءة الثلاث وكيفية توزيع السبوتات والليد بروفايل لإبراز الجمال.", img: "https://i.ibb.co/689N9P9F/Gemini-Generated-Image-Lighting.png", cat: "ديكور" },
        { id: 2, title: "سحر لون الفانيلا لاتيه 2026", desc: "لماذا يتربع هذا اللون على عرش الدهانات وكيف تنسقه مع الإضاءة والأثاث بشكل احترافي.", img: "https://i.ibb.co/zhgWMbM3/Rokn-Design-Vanilla-Latte.png", cat: "ديكور" },
        { id: 1, title: "دليل العزل المائي الشامل", desc: "تعرف على أصول العزل المائي للحمامات والمطابخ وكيفية تجنب تسريبات المياه الخطيرة.", img: "https://i.ibb.co/8Lww9B1f/Gemini-Generated-Image-6c2kiw6c2kiw6c2k.png", cat: "تأسيس" }
    ];

    let currentCategory = 'الكل';

    function render() {
        const grid = document.getElementById('articlesGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';
        const sortedArticles = [...allArticles].sort((a, b) => b.id - a.id);
        sortedArticles.forEach(art => {
            const matchesCat = (currentCategory === 'الكل' || art.cat === currentCategory);
            const matchesSearch = art.title.toLowerCase().includes(searchTerm) || art.desc.toLowerCase().includes(searchTerm);
            if (matchesCat && matchesSearch) {
                grid.innerHTML += `
                    <a href="articles/article${art.id}.html" class="blog-card">
                        <img src="${art.img}" alt="${art.title}">
                        <div class="blog-card-content">
                            <span>#${art.cat}</span>
                            <h3>${art.title}</h3>
                            <p>${art.desc}</p>
                            <div class="read-more">إقرأ المقال كاملاً <i class="fas fa-chevron-left"></i></div>
                        </div>
                    </a>
                `;
            }
        });
        if (grid.innerHTML === '') {
            grid.innerHTML = '<div style="text-align:center; padding:50px; grid-column: 1/-1;"><p style="color:#666;">لا توجد مقالات تطابق بحثك.</p></div>';
        }
    }
    function filterByCat(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }
    function runFilter() { render(); }
    window.onload = render;
</script>

</body>
</html>
